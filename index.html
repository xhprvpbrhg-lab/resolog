<!DOCTYPE html>
<html lang="ja" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resolog</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Resolog">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #181D36; --primary-lt: #252C4A;
      --accent: #C4A87A; --accent-lt: #D4B88A;
      --bg: #F5F4F0; --card: #FFFFFF; --border: #DDD9D0;
      --text: #2E2E2E; --muted: #888880;
      --success: #27AE60; --danger: #C0392B; --hl: #1565C0;
      --r: 8px; --shadow: 0 2px 10px rgba(0,0,0,0.08);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { background: var(--primary); color: #fff; padding: 14px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 3px 12px rgba(0,0,0,0.25); }
    .header-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    header h1 { font-size: 20px; font-weight: 300; letter-spacing: .1em; white-space: nowrap; font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif; font-style: italic; color: var(--accent-lt); }
    .nav-wrap { display: flex; align-items: center; gap: 8px; }
    .nav-tabs { display: flex; gap: 3px; background: rgba(255,255,255,0.12); padding: 4px; border-radius: 10px; }
    .nav-tab { background: none; border: none; color: rgba(255,255,255,0.65); padding: 6px 13px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: all .2s; white-space: nowrap; }
    .nav-tab.active { background: #fff; color: var(--primary); }
    .nav-tab:hover:not(.active) { color: #fff; }
    .record-count { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; margin-left: 4px; display: none; }
    .lang-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.35); color: #fff; font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 6px; cursor: pointer; font-family: inherit; letter-spacing: .06em; transition: background .2s; white-space: nowrap; }
    .lang-btn:hover { background: rgba(255,255,255,0.28); }

    main { max-width: 860px; margin: 0 auto; padding: 24px 16px 48px; }
    .view { display: none; }
    .view.active { display: block; }

    .card { background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 520px) { .form-row { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group + .form-group { margin-top: 14px; }
    .form-group label { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .04em; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 13px; border: 1px solid var(--border); border-radius: var(--r);
      font-size: 15px; font-family: inherit; color: var(--text); background: #fff;
      transition: border-color .2s, box-shadow .2s; -webkit-appearance: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,168,122,.18); }
    .form-group textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
    select { cursor: pointer; }

    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
    .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .checkbox-row label { font-size: 14px; font-weight: 600; cursor: pointer; }

    .scenes-card { background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px; overflow: hidden; }
    .scene-tab-bar { display: flex; overflow-x: auto; background: var(--primary-lt); scrollbar-width: none; }
    .scene-tab-bar::-webkit-scrollbar { display: none; }
    .scene-tab-btn { background: none; border: none; border-bottom: 3px solid transparent; color: rgba(255,255,255,.6); padding: 12px 15px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; white-space: nowrap; transition: all .2s; }
    .scene-tab-btn.active { color: #fff; border-bottom-color: var(--accent-lt); background: rgba(255,255,255,.07); }
    .scene-tab-btn:hover:not(.active) { color: #fff; }
    .scene-content { display: none; padding: 18px 20px; }
    .scene-content.active { display: block; }

    .scene-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .prog-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s ease; }
    .prog-text { font-size: 12px; color: var(--muted); min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }

    .checklist-item { display: flex; align-items: flex-start; gap: 11px; cursor: pointer; user-select: none; }
    .checklist-item input[type="checkbox"] { width: 17px; height: 17px; margin-top: 2px; flex-shrink: 0; accent-color: var(--accent); cursor: pointer; }
    .item-label { font-size: 14px; line-height: 1.45; flex: 1; transition: color .2s; }
    .checklist-item.checked .item-label { color: var(--muted); text-decoration: line-through; }
    .item-hl-dot { font-size: 11px; margin-right: 4px; display: none; }

    .item-wrapper { padding: 8px 0; border-bottom: 1px solid #F0EDE8; transition: opacity .2s; }
    .item-wrapper:last-child { border-bottom: none; }
    .item-wrapper .checklist-item { border-bottom: none; padding: 0; }
    .item-wrapper.item-hl .item-hl-dot { display: inline; }
    .item-wrapper.item-gray { opacity: 0.32; }

    .item-memo { display: block; width: 100%; margin-top: 6px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; color: var(--text); background: #FAFAF7; }
    .item-memo:focus { outline: none; border-color: var(--accent); }
    .climate-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 13px; color: var(--muted); }
    .climate-input { width: 68px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; color: var(--text); background: #FAFAF7; }
    .climate-input:focus { outline: none; border-color: var(--accent); }

    .group-section { margin-bottom: 2px; }
    .group-header {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: .09em;
      text-transform: uppercase; padding: 10px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 2px;
      transition: color .2s, opacity .2s;
    }
    .group-header.gh-hl { color: var(--hl); }
    .group-header.gh-gray { color: var(--muted); opacity: 0.45; }
    .gh-dot { font-size: 11px; margin-left: 4px; display: none; }
    .group-header.gh-hl .gh-dot { display: inline; }
    .gh-count { font-size: 11px; font-weight: 700; color: inherit; }

    .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: var(--r); font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: .06em; transition: background .2s, transform .1s; }
    .btn-primary:hover { background: var(--accent-lt); }
    .btn-primary:active { transform: scale(.98); }

    .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .search-bar { position: relative; margin-bottom: 12px; }
    .search-bar svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--muted); }
    .search-bar input { width: 100%; padding: 10px 14px 10px 36px; border: 1px solid var(--border); border-radius: var(--r); font-size: 14px; font-family: inherit; color: var(--text); background: var(--card); transition: border-color .2s, box-shadow .2s; -webkit-appearance: none; }
    .search-bar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,168,122,.18); }
    .search-bar input::placeholder { color: var(--muted); }
    .list-header h2 { font-size: 16px; font-weight: 700; color: var(--primary); }
    .filter-select { font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); font-family: inherit; color: var(--text); cursor: pointer; }
    .record-card { background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); border: 1px solid var(--border); padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color .2s, box-shadow .2s, transform .1s; display: flex; align-items: center; gap: 16px; }
    .record-card:hover { border-color: var(--accent); box-shadow: 0 4px 14px rgba(196,168,122,.22); }
    .record-card:active { transform: scale(.99); }
    .date-badge { background: var(--primary); color: #fff; border-radius: 7px; padding: 8px 10px; text-align: center; min-width: 58px; flex-shrink: 0; }
    .date-badge .ym { font-size: 10px; opacity: .7; }
    .date-badge .dd { font-size: 24px; font-weight: 800; line-height: 1.1; }
    .record-info { flex: 1; min-width: 0; }
    .record-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .record-meta { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .rc-instrument { font-size: 12px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    .rc-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .rc-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; background: rgba(24,29,54,.07); color: var(--primary); border: 1px solid rgba(24,29,54,.13); letter-spacing: .02em; white-space: nowrap; }
    .rc-tag-more { background: rgba(196,168,122,.13); color: var(--accent); border-color: rgba(196,168,122,.35); }
    .record-card.rc-md-exported { border-left: 3px solid var(--accent); background: rgba(196,168,122,.04); }
    .record-card.rc-needs-export { border-left: 3px solid #b94040; background: rgba(185,64,64,.03); }
    .rc-md-badge { display: inline-flex; align-items: center; font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 10px; letter-spacing: .05em; white-space: nowrap; margin-top: 5px; }
    .rc-badge-exported { background: rgba(196,168,122,.18); color: #9a7d4e; border: 1px solid rgba(196,168,122,.45); }
    .rc-badge-needs { background: rgba(185,64,64,.1); color: #b94040; border: 1px solid rgba(185,64,64,.35); }
    .completion-badge { flex-shrink: 0; text-align: right; }
    .completion-pct { font-size: 20px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
    .completion-lbl { font-size: 10px; color: var(--muted); }
    .empty-state { text-align: center; padding: 70px 20px; color: var(--muted); }
    .empty-state h3 { font-size: 17px; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    .top-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    /* ---- Asset Suggest Panel ---- */
    .asset-suggest { background: var(--card); border: 1.5px solid var(--accent); border-radius: var(--r); padding: 14px 16px; margin-top: 10px; }
    .as-title { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 6px; }
    .as-name  { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
    .as-rows  { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; margin-bottom: 12px; font-size: 12px; }
    .as-row   { display: flex; gap: 5px; }
    .as-lbl   { color: var(--muted); font-weight: 600; white-space: nowrap; }
    .as-val   { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .as-btn   { background: var(--primary); color: var(--accent-lt); border: none; border-radius: 8px; padding: 8px 16px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .17s; }
    .as-btn:hover { background: var(--primary-lt); }
    .as-divider { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin: 10px 0 6px; }
    .as-eval-preview { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 14px; margin-bottom: 10px; }
    .as-eval-item { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 12px; }
    .as-eval-score { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 800; background: var(--primary); color: var(--accent-lt); flex-shrink: 0; }
    .btn-ghost { background: none; border: 1px solid var(--border); padding: 8px 14px; border-radius: var(--r); cursor: pointer; font-size: 13px; font-family: inherit; color: var(--text); transition: all .2s; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 8px 14px; border-radius: var(--r); cursor: pointer; font-size: 13px; font-family: inherit; transition: all .2s; }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    .detail-header { background: var(--primary); color: #fff; padding: 20px 22px; border-radius: var(--r); margin-bottom: 16px; }
    .detail-header h2 { font-size: 18px; margin-bottom: 8px; }
    .detail-meta { font-size: 13px; opacity: .8; display: flex; flex-wrap: wrap; gap: 14px; }
    .detail-completion { margin-top: 14px; display: flex; align-items: center; gap: 10px; }
    .detail-prog-bar { flex: 1; height: 8px; background: rgba(255,255,255,.25); border-radius: 4px; overflow: hidden; }
    .detail-prog-fill { height: 100%; background: var(--accent-lt); border-radius: 4px; }
    .detail-pct { font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.2); }
    @media (max-width: 400px) { .detail-info-grid { grid-template-columns: 1fr; } }
    .info-item .info-label { font-size: 10px; opacity: .6; text-transform: uppercase; letter-spacing: .07em; }
    .info-item .info-value { font-size: 14px; font-weight: 600; margin-top: 2px; }

    .detail-scene { margin-bottom: 4px; }
    .detail-scene-hd { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 800; color: var(--accent); letter-spacing: .08em; text-transform: uppercase; padding: 8px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
    .detail-group-hd { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: .08em; text-transform: uppercase; padding: 8px 0 4px; border-bottom: 1px solid var(--border); margin: 6px 0 2px; }
    .detail-group-hd.hl { color: var(--hl); }
    .detail-item { display: flex; align-items: flex-start; gap: 9px; padding: 7px 0; border-bottom: 1px solid #F0EDE8; font-size: 13.5px; }
    .detail-item:last-child { border-bottom: none; }
    .check-dot { width: 17px; height: 17px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    .check-dot.yes { background: var(--success); color: #fff; }
    .check-dot.no  { background: #E8E5E0; color: #E8E5E0; }
    .detail-item.unchecked { color: var(--muted); }
    .detail-memo    { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .detail-climate { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .tuning-form { padding-top: 4px; }
    .tuning-field { padding: 12px 0; border-bottom: 1px solid #F0EDE8; }
    .tuning-field:last-child { border-bottom: none; }
    .tf-label { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .04em; margin-bottom: 8px; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .btn-group input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .btn-group label { display: inline-block; padding: 7px 16px; border: 1.5px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all .15s; background: var(--bg); color: var(--text); user-select: none; }
    .btn-group input[type="radio"]:checked + label { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
    .piano-type-group label { padding: 10px 22px; font-size: 15px; font-weight: 700; }
    .custom-pitch-input { display: block; margin-top: 10px; width: 140px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--r); font-size: 15px; font-family: inherit; color: var(--text); background: #fff; }
    .custom-pitch-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,115,85,.15); }
    .tuning-form input[type="text"] { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--r); font-size: 14px; font-family: inherit; color: var(--text); background: #fff; transition: border-color .2s, box-shadow .2s; }
    .tuning-form input[type="text"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,115,85,.15); }
    .tuning-summary-row { display: flex; gap: 12px; padding: 7px 0; border-bottom: 1px solid #F0EDE8; font-size: 13.5px; align-items: baseline; }
    .tuning-summary-row:last-child { border-bottom: none; }
    .ts-label { flex-shrink: 0; width: 160px; font-weight: 600; color: var(--muted); font-size: 13px; }
    .ts-value { flex: 1; }
    .memo-box { background: #FAFAF7; border: 1px solid var(--border); border-radius: 7px; padding: 14px 16px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }

    .mm-grid { display: grid; grid-template-columns: 2.6em 1fr 1fr 1fr; gap: 3px 4px; margin-top: 7px; }
    .mm-col-hd { font-size: 11px; font-weight: 700; color: var(--muted); text-align: center; padding-bottom: 1px; }
    .mm-row-lb { font-size: 11px; color: var(--muted); display: flex; align-items: center; }
    .mm-input { width: 100%; padding: 5px 2px; border: 1px solid var(--border); border-radius: 5px; font-size: 14px; font-family: inherit; text-align: center; color: var(--text); background: #FAFAF7; -webkit-appearance: none; appearance: none; }
    .mm-input:focus { outline: none; border-color: var(--accent); }
    .mm-detail-tbl { font-size: 12px; border-collapse: collapse; margin-top: 4px; }
    .mm-detail-tbl th, .mm-detail-tbl td { padding: 2px 8px; text-align: center; }
    .mm-detail-tbl th:first-child, .mm-detail-tbl td:first-child { text-align: left; padding-left: 0; color: var(--muted); font-weight: 400; }
    .mm-detail-tbl td:not(:first-child) { font-weight: 600; }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--primary); color: #fff; padding: 11px 24px; border-radius: 24px; font-size: 14px; font-weight: 600; box-shadow: 0 6px 20px rgba(0,0,0,0.22); transition: transform .3s cubic-bezier(.34,1.56,.64,1); z-index: 500; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .eval-section-hd { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .slider-table { width: 100%; border-collapse: collapse; margin-bottom: 2px; }
    .slider-col-hd { font-size: 11px; font-weight: 700; color: var(--muted); text-align: center; padding: 0 6px 10px; }
    .slider-item-label { font-size: 13px; font-weight: 600; padding: 8px 10px 8px 0; vertical-align: middle; line-height: 1.35; }
    .slider-hint { display: block; font-size: 10px; color: var(--muted); font-weight: 400; margin-top: 3px; }
    .slider-cell { text-align: center; padding: 4px 6px; vertical-align: middle; }
    .slider-val { font-size: 20px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; display: block; margin-bottom: 2px; }
    .slider-table input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .eval-memo-input { width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-family: inherit; color: var(--text); background: #FAFAF7; }
    .eval-memo-input:focus { outline: none; border-color: var(--accent); }
    .eval-memo-row td { padding: 0 4px 10px; }
    .eval-fb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    @media (max-width: 500px) { .eval-fb-grid { grid-template-columns: 1fr; } }
    .eval-fb-grid textarea { min-height: 70px; resize: vertical; }
    .detail-eval-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 8px; }
    .detail-eval-table th { font-size: 11px; color: var(--muted); font-weight: 700; padding: 4px 8px 8px; text-align: center; }
    .detail-eval-table th:first-child { text-align: left; }
    .detail-eval-table td { padding: 6px 8px; border-bottom: 1px solid #F0EDE8; vertical-align: middle; }
    .detail-eval-table td:not(:first-child) { text-align: center; font-variant-numeric: tabular-nums; font-weight: 700; font-size: 15px; }
    .det-ev-diff.up { color: var(--success); }
    .det-ev-diff.down { color: var(--danger); }

    @media print {
      header, .top-actions, .btn-primary, .nav-wrap { display: none !important; }
      body { background: #fff; }
      main { padding: 0; }
      .card, .scenes-card, .detail-header { box-shadow: none !important; }
      .view { display: block !important; }
      #view-new, #view-list { display: none !important; }
    }

    /* ---- Obsidian toggle ---- */
    .ob-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; padding: 7px 13px; border: 1px solid var(--border); border-radius: var(--r); background: none; transition: border-color .2s, color .2s; user-select: none; }
    .ob-toggle:has(input:checked) { border-color: var(--accent); color: var(--accent); }
    .ob-toggle input[type="checkbox"] { accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer; flex-shrink: 0; }

    /* ---- Tags card ---- */
    .tag-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tag-chip { display: inline-flex; align-items: center; gap: 3px; padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); color: var(--muted); background: #fff; user-select: none; transition: all .15s; }
    .tag-chip:hover { border-color: var(--accent); }
    .tag-chip.tc-active { border-color: var(--accent); color: var(--accent); background: rgba(196,168,122,.1); }
    .tag-chip.tc-custom { border-style: dashed; }
    .tag-input-row { display: flex; gap: 8px; }
    .tag-input-row input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--r); font-size: 13px; font-family: inherit; color: var(--text); background: #fff; }
    .tag-input-row input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(196,168,122,.18); }
    .tag-yaml-preview { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; font-size: 12px; background: #F9F8F5; border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; margin-top: 12px; white-space: pre; color: var(--text); }

    /* ---- Related Notes ---- */
    .rn-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .rn-note { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #F0EDE8; }
    .rn-note:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .rn-note-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .rn-note-title { font-size: 13px; font-weight: 700; color: var(--text); }
    .rn-note-path { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'SFMono-Regular', Consolas, monospace; }
    .rn-preview { background: #F9F8F5; border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; font-size: 11px; white-space: pre; line-height: 1.5; color: var(--text); max-height: 180px; overflow: auto; }

    /* ---- Detail view — redesigned ---- */
    .d-top-nav { margin-bottom: 14px; }
    .d-back-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; color: var(--muted); padding: 4px 0; transition: color .2s; }
    .d-back-btn:hover { color: var(--text); }
    .d-back-btn svg { flex-shrink: 0; }

    .d-hero { background: linear-gradient(148deg, var(--primary) 0%, #1f2645 100%); border-radius: 16px; padding: 26px 24px 22px; margin-bottom: 12px; box-shadow: 0 8px 28px rgba(24,29,54,.30); color: #fff; position: relative; overflow: hidden; }
    .d-hero::after { content:''; position:absolute; bottom:-50px; right:-50px; width:180px; height:180px; background:var(--accent); opacity:.05; border-radius:50%; pointer-events:none; }
    .d-hero-eyebrow { font-size: 11px; font-weight: 700; color: var(--accent-lt); letter-spacing: .13em; text-transform: uppercase; margin-bottom: 7px; }
    .d-hero-name { font-size: 22px; font-weight: 300; line-height: 1.3; font-family: 'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif; font-style: italic; color: #fff; margin-bottom: 14px; word-break: break-word; }
    .d-hero-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .d-badge { background: rgba(255,255,255,.11); border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.88); font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 20px; letter-spacing: .03em; }
    .d-badge-gold { background: rgba(196,168,122,.2); border-color: rgba(196,168,122,.45); color: var(--accent-lt); }
    .d-hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; padding: 14px 0 16px; border-top: 1px solid rgba(255,255,255,.13); }
    @media (max-width: 400px) { .d-hero-grid { grid-template-columns: 1fr; } }
    .d-hgi-label { font-size: 10px; color: rgba(255,255,255,.46); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }
    .d-hgi-value { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.9); }
    .d-hero-prog { display: flex; align-items: center; gap: 12px; }
    .d-hero-prog-track { flex: 1; height: 5px; background: rgba(255,255,255,.17); border-radius: 3px; overflow: hidden; }
    .d-hero-prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-lt)); border-radius: 3px; transition: width .3s; }
    .d-hero-prog-pct { font-size: 15px; font-weight: 800; color: var(--accent-lt); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .d-hero-prog-done { font-size: 11px; font-weight: 600; opacity: .65; margin-left: 3px; }

    .d-action-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; position: relative; align-items: flex-start; }
    .d-btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 17px; border-radius: 10px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; letter-spacing: .02em; transition: all .17s; white-space: nowrap; border: 2px solid transparent; line-height: 1; }
    .d-btn svg { flex-shrink: 0; }
    .d-btn-primary { background: var(--primary); color: var(--accent-lt); border-color: var(--primary); }
    .d-btn-primary:hover { background: var(--primary-lt); border-color: var(--primary-lt); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(24,29,54,.26); }
    .d-btn-secondary { background: var(--card); color: var(--text); border-color: var(--border); }
    .d-btn-secondary:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(196,168,122,.18); }
    .d-btn-ghost { background: none; color: var(--muted); border-color: var(--border); }
    .d-btn-ghost:hover, .d-btn-ghost.open { border-color: var(--text); color: var(--text); }

    .d-more-wrap { position: relative; }
    .d-more-menu { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 12px 32px rgba(0,0,0,.15); min-width: 196px; z-index: 300; overflow: hidden; }
    .d-more-menu.open { display: block; }
    .d-more-item { display: flex; align-items: center; gap: 10px; padding: 13px 16px; font-size: 14px; font-weight: 500; font-family: inherit; color: var(--text); background: none; border: none; cursor: pointer; width: 100%; text-align: left; transition: background .13s; border-top: 1px solid var(--border); }
    .d-more-item:first-child { border-top: none; }
    .d-more-item:hover { background: var(--bg); }
    .d-more-item svg { flex-shrink: 0; color: var(--muted); }
    .d-more-danger { color: var(--danger); }
    .d-more-danger:hover { background: #FDF0EF; }
    .d-more-danger svg { color: var(--danger); }
    .d-ob-row { justify-content: space-between; }
    .d-ob-check { margin-left: auto !important; accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }

    /* ---- Summary Builder ---- */
    .sb-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .sb-toolbar-info { font-size: 12px; color: var(--muted); }
    .sb-list { display: flex; flex-direction: column; }
    .sb-item { display: grid; grid-template-columns: 20px 1fr 52px; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #F0EDE8; }
    .sb-item:last-child { border-bottom: none; }
    .sb-item.sb-excluded { opacity: 0.38; }
    .sb-include { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .sb-text { width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; font-family: inherit; color: var(--text); background: #fff; }
    .sb-text:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(196,168,122,.18); }
    .sb-btns { display: flex; flex-direction: column; gap: 2px; }
    .sb-move { background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 11px; padding: 2px 6px; color: var(--muted); line-height: 1.5; }
    .sb-move:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .sb-move:disabled { opacity: 0.2; cursor: default; }
    .sb-preview-area { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .sb-preview-label { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
    .sb-preview { background: #F9F8F5; border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; font-size: 12px; white-space: pre-wrap; line-height: 1.6; color: var(--text); max-height: 220px; overflow-y: auto; }

    /* ---- Touch Measurement ---- */
    .touch-section { margin: 4px 0 2px; }
    .touch-section-hd { font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: .09em; text-transform: uppercase; padding: 10px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }
    .touch-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #F0EDE8; }
    .touch-row:last-child { border-bottom: none; }
    .touch-label { font-size: 14px; flex: 1; line-height: 1.35; }
    .touch-ctrl { display: flex; align-items: center; gap: 6px; }
    .touch-input { width: 78px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit; color: var(--text); background: #FAFAF7; text-align: right; -webkit-appearance: none; appearance: none; }
    .touch-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(196,168,122,.18); }
    .touch-result { width: 78px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit; color: var(--muted); background: #F0EDE8; text-align: right; }
    .touch-unit { font-size: 12px; color: var(--muted); width: 14px; flex-shrink: 0; }
    .touch-badge { display: inline-block; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: .02em; }
    .touch-badge.tb-normal  { background: #E8F5E9; color: #2E7D32; }
    .touch-badge.tb-caution { background: #FFF8E1; color: #E65100; }
    .touch-badge.tb-extreme { background: #FFEBEE; color: #B71C1C; }
    .touch-badge.tb-none    { background: #F0EDE8; color: var(--muted); }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1>Resolog</h1>
    <div class="nav-wrap">
      <div class="nav-tabs">
        <button class="nav-tab active" data-view="new" data-i18n="navNew">新規記録</button>
        <button class="nav-tab" data-view="list"><span data-i18n="navList">記録一覧</span><span class="record-count" id="nav-count"></span></button>
      </div>
      <button class="lang-btn" id="lang-btn" title="Switch language">EN</button>
    </div>
  </div>
</header>

<main>
  <div class="view active" id="view-new">
    <div class="card">
      <div class="card-title" data-i18n="cardBasic">基本情報</div>
      <!-- Row 1: Serial | Model -->
      <div class="form-row">
        <div class="form-group">
          <label for="f-serial" data-i18n="lblSerial">製造番号</label>
          <input type="text" id="f-serial" list="dl-serial" placeholder="例：1234567" data-i18n-ph="phSerial" autocomplete="off">
          <datalist id="dl-serial"></datalist>
        </div>
        <div class="form-group">
          <label for="f-model" data-i18n="lblModel">モデル名</label>
          <input type="text" id="f-model" list="dl-model" placeholder="例：CFX、S6X、CFIII" data-i18n-ph="phModel" autocomplete="off">
          <datalist id="dl-model"></datalist>
        </div>
      </div>
      <!-- Asset suggestion panel (hidden by default) -->
      <div id="asset-suggest-panel" class="asset-suggest" style="display:none"></div>
      <!-- Row 2: Make | Piano Type -->
      <div class="form-row" style="margin-top:14px">
        <div class="form-group">
          <label for="f-maker" data-i18n="lblMaker">メーカー</label>
          <input type="text" id="f-maker" list="dl-maker" placeholder="例：YAMAHA、KAWAI、Steinway" data-i18n-ph="phMaker" autocomplete="off">
          <datalist id="dl-maker"></datalist>
        </div>
        <div class="form-group">
          <label data-i18n="lblType">ピアノ種別</label>
          <div class="btn-group piano-type-group">
            <input type="radio" id="pt-grand"   name="piano-type" value="grand">
            <label for="pt-grand" data-i18n="ptGrand">GP（グランド）</label>
            <input type="radio" id="pt-upright" name="piano-type" value="upright">
            <label for="pt-upright" data-i18n="ptUpright">UP（アップライト）</label>
          </div>
        </div>
      </div>
      <!-- Row 3: Venue | Client/Artist -->
      <div class="form-row" style="margin-top:14px">
        <div class="form-group">
          <label for="f-location" data-i18n="lblLocation">会場名</label>
          <input type="text" id="f-location" list="dl-location" placeholder="例：〇〇ホール、△△文化会館" data-i18n-ph="phLocation" autocomplete="off">
          <datalist id="dl-location"></datalist>
        </div>
        <div class="form-group">
          <label for="f-customer" data-i18n="lblCustomer">顧客 / アーティスト</label>
          <input type="text" id="f-customer" list="dl-customer" placeholder="例：山田 花子、〇〇カルテット" data-i18n-ph="phCustomer" autocomplete="off">
          <datalist id="dl-customer"></datalist>
          <select id="f-client-type" style="margin-top:6px;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r);font-family:inherit;color:var(--muted);background:#fff;cursor:pointer;">
            <option value="artist" data-i18n="ctArtist">アーティスト</option>
            <option value="corporate" data-i18n="ctCorporate">企業 / 団体</option>
            <option value="private" data-i18n="ctPrivate">一般顧客</option>
          </select>
        </div>
      </div>
      <!-- Row 4: Work Type | Date -->
      <div class="form-row" style="margin-top:14px">
        <div class="form-group">
          <label for="f-work-type" data-i18n="lblWorkType">作業種別</label>
          <select id="f-work-type">
            <option value="" data-i18n="wtNone">選択してください</option>
            <option value="concert" data-i18n="wtConcert">コンサート調律</option>
            <option value="maintenance" data-i18n="wtMaintenance">保守点検</option>
            <option value="pre-shipment" data-i18n="wtPreShipment">出荷前</option>
            <option value="recording" data-i18n="wtRecording">録音</option>
            <option value="inspection" data-i18n="wtInspection">点検</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-date" data-i18n="lblDate">日付</label>
          <input type="date" id="f-date">
        </div>
      </div>
      <!-- Row 5: Staff | Last Tuned -->
      <div class="form-row" style="margin-top:14px">
        <div class="form-group">
          <label for="f-staff" data-i18n="lblStaff">スタッフ名</label>
          <input type="text" id="f-staff" list="dl-staff" placeholder="例：Shinya Maeda" autocomplete="off">
          <datalist id="dl-staff"></datalist>
        </div>
        <div class="form-group">
          <label for="f-last-tuned" data-i18n="lblLastTuned">前回調律日</label>
          <input type="date" id="f-last-tuned">
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="f-disklavier">
        <label for="f-disklavier" data-i18n="lblDisklavier">Disklavier 搭載</label>
      </div>
    </div>

    <div class="scenes-card">
      <div class="scene-tab-bar" id="scene-tab-bar"></div>
      <div id="scene-panels"></div>
    </div>

    <div class="card">
      <div class="card-title" data-i18n="cardEval">評価・フィードバック</div>
      <div class="eval-section-hd" data-i18n="evalSelfHd">自分の評価（作業前 → 作業後）</div>
      <table class="slider-table">
        <colgroup><col style="width:46%"><col style="width:27%"><col style="width:27%"></colgroup>
        <thead><tr><th></th><th class="slider-col-hd" data-i18n="evalBefore">作業前</th><th class="slider-col-hd" data-i18n="evalAfter">作業後</th></tr></thead>
        <tbody>
          <tr><td class="slider-item-label" data-sl-key="touch">タッチ<span class="slider-hint">重い → 軽い</span></td><td class="slider-cell"><span class="slider-val" id="sv-touch-before">3</span><input type="range" min="1" max="5" value="3" id="sl-touch-before"></td><td class="slider-cell"><span class="slider-val" id="sv-touch-after">3</span><input type="range" min="1" max="5" value="3" id="sl-touch-after"></td></tr>
          <tr class="eval-memo-row"><td colspan="3"><input type="text" class="eval-memo-input" id="em-touch" placeholder="変化の要因・作業内容…" data-i18n-ph="phEvalMemo"></td></tr>
          <tr><td class="slider-item-label" data-sl-key="repetition">連打<span class="slider-hint">遅い → 速い</span></td><td class="slider-cell"><span class="slider-val" id="sv-repetition-before">3</span><input type="range" min="1" max="5" value="3" id="sl-repetition-before"></td><td class="slider-cell"><span class="slider-val" id="sv-repetition-after">3</span><input type="range" min="1" max="5" value="3" id="sl-repetition-after"></td></tr>
          <tr class="eval-memo-row"><td colspan="3"><input type="text" class="eval-memo-input" id="em-repetition" placeholder="変化の要因・作業内容…" data-i18n-ph="phEvalMemo"></td></tr>
          <tr><td class="slider-item-label" data-sl-key="volume">音量・ダイナミックレンジ<span class="slider-hint">不十分 → 良好</span></td><td class="slider-cell"><span class="slider-val" id="sv-volume-before">3</span><input type="range" min="1" max="5" value="3" id="sl-volume-before"></td><td class="slider-cell"><span class="slider-val" id="sv-volume-after">3</span><input type="range" min="1" max="5" value="3" id="sl-volume-after"></td></tr>
          <tr class="eval-memo-row"><td colspan="3"><input type="text" class="eval-memo-input" id="em-volume" placeholder="変化の要因・作業内容…" data-i18n-ph="phEvalMemo"></td></tr>
          <tr><td class="slider-item-label" data-sl-key="tone_color">音色<span class="slider-hint">暗い・暖かい → 明るい</span></td><td class="slider-cell"><span class="slider-val" id="sv-tone_color-before">3</span><input type="range" min="1" max="5" value="3" id="sl-tone_color-before"></td><td class="slider-cell"><span class="slider-val" id="sv-tone_color-after">3</span><input type="range" min="1" max="5" value="3" id="sl-tone_color-after"></td></tr>
          <tr class="eval-memo-row"><td colspan="3"><input type="text" class="eval-memo-input" id="em-tone_color" placeholder="変化の要因・作業内容…" data-i18n-ph="phEvalMemo"></td></tr>
          <tr><td class="slider-item-label" data-sl-key="intonation">発音・伸び<span class="slider-hint">詰まる → 開く・伸びる</span></td><td class="slider-cell"><span class="slider-val" id="sv-intonation-before">3</span><input type="range" min="1" max="5" value="3" id="sl-intonation-before"></td><td class="slider-cell"><span class="slider-val" id="sv-intonation-after">3</span><input type="range" min="1" max="5" value="3" id="sl-intonation-after"></td></tr>
          <tr class="eval-memo-row"><td colspan="3"><input type="text" class="eval-memo-input" id="em-intonation" placeholder="変化の要因・作業内容…" data-i18n-ph="phEvalMemo"></td></tr>

function t(key, ...args) {
  const val = (I18N[lang] ?? I18N.ja)[key] ?? (I18N.ja[key] ?? key);
  return typeof val === 'function' ? val(...args) : val;
}

function applyI18n() {
  document.getElementById('html-root').lang = lang;
  document.getElementById('lang-btn').textContent = t('langBtn');
  // text content
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  // placeholders
  document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = t(el.dataset.i18nPh); });
  // date inputs: set lang attribute so browser renders correct calendar locale
  document.querySelectorAll('input[type="date"]').forEach(el => { el.setAttribute('lang', lang); });
  // eval slider labels (text node + hint span)
  document.querySelectorAll('.slider-item-label[data-sl-key]').forEach(td => {
    const key = td.dataset.slKey;
    const hint = td.querySelector('.slider-hint');
    const textNode = Array.from(td.childNodes).find(n => n.nodeType === 3);
    if (textNode) textNode.textContent = t('sl' + slKey(key));
    if (hint) hint.textContent = t('sl' + slKey(key) + 'Hint');
  });
  // nav list tab special case (has child span)
  const navListBtn = document.querySelector('[data-view="list"] [data-i18n="navList"]');
  if (navListBtn) navListBtn.textContent = t('navList');
  // save button (only if not in edit mode)
  const btnSave = document.getElementById('btn-save');
  if (btnSave && !editingId) btnSave.textContent = t('btnSave');
  // rebuild checklist panel to pick up new language labels
  const newView = document.getElementById('view-new');
  if (newView && newView.classList.contains('active')) {
    buildScenes(); restoreChecklistUI(); restoreTuningUI(); restoreEvalForm();
  }
}

function workTypeLabel(wt) {
  const map = { concert:'wlConcert', maintenance:'wlMaintenance', 'pre-shipment':'wlPreShipment',
    recording:'wlRecording', regular:'wlRegular', 'pitch-raise':'wlPitchRaise', other:'wlOther', inspection:'wlInspection' };
  return map[wt] ? t(map[wt]) : wt;
}
function clientTypeLabel(ct) {
  return ct === 'artist' ? t('clientArtist') : ct === 'corporate' ? t('clientCorporate') : ct === 'private' ? t('clientPrivate') : ct;
}
function overallLabel(v) {
  return v === 'none' ? t('ovNone') : v === 'satisfied' ? t('ovSat') : v === 'needs-improvement' ? t('ovImp') : v;
}

// Convert snake_case key to PascalCase for I18N lookup (e.g. 'tone_color' → 'ToneColor')
function slKey(k) { return k.split('_').map(w => w[0].toUpperCase() + w.slice(1)).join(''); }
function getEvalSliders() {
  return EVAL_SLIDERS.map(({ key }) => ({ key, label: t('sl' + slKey(key)), hint: t('sl' + slKey(key) + 'Hint') }));
}
// Key migration map: old camelCase/legacy keys → new snake_case keys
const EVAL_KEY_MIGRATE = {
  bright: 'tone_color', open: 'intonation', toneChange: 'dynamics_curve', uniformity: 'evenness',
  tone: 'tone_color', tone_evolution: 'dynamics_curve', balance: 'evenness',
};
function migrateEvaluation(raw) {
  const ev = raw || {};
  const result = {};
  EVAL_SLIDERS.forEach(({ key }) => {
    if (ev[key]) {
      result[key] = { before: ev[key].before ?? 3, after: ev[key].after ?? 3, memo: ev[key].memo || '' };
    } else {
      const oldKey = Object.keys(EVAL_KEY_MIGRATE).find(ok => EVAL_KEY_MIGRATE[ok] === key && ev[ok]);
      result[key] = oldKey
        ? { before: ev[oldKey].before ?? 3, after: ev[oldKey].after ?? 3, memo: ev[oldKey].memo || '' }
        : { before: 3, after: 3, memo: '' };
    }
  });
  result.positive = ev.positive || '';
  result.negative = ev.negative || '';
  result.overall  = ev.overall  || '';
  return result;
}

/* =====================================================
   HELPERS
===================================================== */
function getScenes()        { return currentPianoType === 'upright' ? SCENES_UP : SCENES_GP; }
function getScenesFor(t)    { return t === 'upright' ? SCENES_UP : SCENES_GP; }
function iLabel(item)       { return (lang === 'en' && item.enLabel) ? item.enLabel : item.label; }
function gLabel(group)      { return (lang === 'en' && group.enLabel) ? group.enLabel : group.label; }
function sName(scene)       { return (lang === 'en' && scene.enName) ? scene.enName : scene.name; }
function fmtDate(str)       { if (!str) return ''; const [y,m,d] = str.split('-'); return t('fmtDate', y, m, d); }

function load()  { try { records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { records = []; } }
function save()  { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }

/* =====================================================
   VIEWS
===================================================== */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.view === id || (id === 'detail' && t.dataset.view === 'list')));
  if (id === 'list') renderList();
  updateNavCount();
}
function updateNavCount() {
  const el = document.getElementById('nav-count');
  el.textContent = records.length;
  el.style.display = records.length > 0 ? 'inline-block' : 'none';
}

/* =====================================================
   CHECKLIST STATE INIT
===================================================== */
function initChecklist() {
  checklist  = {};
  tuningData = { pitchBefore: '440', pitchAfter: '440', preCondition: '', postComment: '', stringPinMemo: '' };
  touchData  = { inspectionDW: '', inspectionUW: '', finalDW: '', finalUW: '' };
  getScenes().forEach(s => {
    if (s.type === 'form') return;
    checklist[s.id] = {};
    s.groups.forEach(g => g.items.forEach(item => {
      const st = { checked: false };
      if (item.hasMemo)    st.memo = '';
      if (item.hasClimate) { st.temp = ''; st.humidity = ''; }
      if (item.hasMm)    { st.mm = { bass: { before: '', after: '' }, mid: { before: '', after: '' }, treble: { before: '', after: '' } }; st.memo = ''; }
      checklist[s.id][item.id] = st;
    }));
  });
}

/* =====================================================
   SCENE BUILDING
===================================================== */
function buildScenes() {
  const scenes = getScenes();
  const tabBar = document.getElementById('scene-tab-bar');
  const panels = document.getElementById('scene-panels');
  tabBar.innerHTML = '';
  panels.innerHTML = '';

  scenes.forEach((scene, si) => {
    const btn = document.createElement('button');
    btn.className = 'scene-tab-btn' + (si === 0 ? ' active' : '');
    btn.textContent = sName(scene);
    btn.addEventListener('click', () => switchScene(scene.id));
    tabBar.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'scene-content' + (si === 0 ? ' active' : '');
    panel.id = 'panel-' + scene.id;

    if (scene.type === 'form') buildTuningPanel(panel);
    else                       buildChecklistPanel(panel, scene);
    panels.appendChild(panel);
  });

  updateDkVisibility();
  updateHighlights();
}

function buildChecklistPanel(panel, scene) {
  const totalItems = countItems(scene, true);
  const prog = document.createElement('div');
  prog.className = 'scene-progress';
  prog.innerHTML = `<div class="prog-bar"><div class="prog-fill" id="pf-${scene.id}" style="width:0%"></div></div><div class="prog-text" id="pt-${scene.id}">0 / ${totalItems}</div>`;
  panel.appendChild(prog);

  const groupEls = [];
  scene.groups.forEach((group, gi) => {
    const section = document.createElement('div');
    section.className = 'group-section';
    if (group.isDkSection) section.classList.add('dk-section');
    section.dataset.sid = scene.id;
    section.dataset.gi  = gi;
    groupEls.push(section);

    if (group.label) {
      const hd = document.createElement('div');
      hd.className = 'group-header';
      hd.id = 'gh-' + scene.id + '-' + gi;
      hd.innerHTML = `<span>${esc(gLabel(group))}<span class="gh-dot">🔵</span></span><span class="gh-count" id="gc-${scene.id}-${gi}">0 / ${group.items.length}</span>`;

      dot.textContent = '🔵 ';

      span.appendChild(dot);
      span.appendChild(txt);
      lbl.appendChild(cb);
      lbl.appendChild(span);
      wrapper.appendChild(lbl);

      if (item.hasClimate) {
        const cr = document.createElement('div');
        cr.className = 'climate-row';
        cr.innerHTML = `<input type="number" class="climate-input" placeholder="°C" step="0.1"><span>°C</span><input type="number" class="climate-input" placeholder="%" step="1" min="0" max="100"><span>%</span>`;
        const [ti, hi] = cr.querySelectorAll('input');
        ti.addEventListener('input', e => { if (checklist[scene.id]?.[item.id]) checklist[scene.id][item.id].temp = e.target.value; });
        hi.addEventListener('input', e => { if (checklist[scene.id]?.[item.id]) checklist[scene.id][item.id].humidity = e.target.value; });
        wrapper.appendChild(cr);
      }
      if (item.hasMemo) {
        const memo = document.createElement('input');
        memo.type = 'text'; memo.className = 'item-memo'; memo.placeholder = t('phItemMemo');
        memo.addEventListener('input', e => { if (checklist[scene.id]?.[item.id]) checklist[scene.id][item.id].memo = e.target.value; });
        wrapper.appendChild(memo);
      }
      if (item.hasMm) {
        const grid = document.createElement('div');
        grid.className = 'mm-grid';
        grid.innerHTML = `
          <div></div><div class="mm-col-hd">${t('zoneBass')}</div><div class="mm-col-hd">${t('zoneMid')}</div><div class="mm-col-hd">${t('zoneTreble')}</div>
          <div class="mm-row-lb">${t('tunePre')}</div>
          <input type="number" class="mm-input" placeholder="—" step="0.5" data-zone="bass" data-phase="before">
          <input type="number" class="mm-input" placeholder="—" step="0.5" data-zone="mid"  data-phase="before">
          <input type="number" class="mm-input" placeholder="—" step="0.5" data-zone="treble" data-phase="before">
          <div class="mm-row-lb">${t('tunePost')}</div>
          <input type="number" class="mm-input" placeholder="—" step="0.5" data-zone="bass" data-phase="after">
          <input type="number" class="mm-input" placeholder="—" step="0.5" data-zone="mid"  data-phase="after">
          <input type="number" class="mm-input" placeholder="—" step="0.5" data-zone="treble" data-phase="after">`;
        grid.querySelectorAll('.mm-input').forEach(inp => {
          inp.addEventListener('input', e => {
            const st = checklist[scene.id]?.[item.id];
            if (st?.mm) st.mm[e.target.dataset.zone][e.target.dataset.phase] = e.target.value;
          });
        });
        wrapper.appendChild(grid);
        const mmMemo = document.createElement('input');
        mmMemo.type = 'text'; mmMemo.className = 'item-memo'; mmMemo.placeholder = t('phMmMemo');
        mmMemo.addEventListener('input', e => { const st = checklist[scene.id]?.[item.id]; if (st) st.memo = e.target.value; });
        wrapper.appendChild(mmMemo);
      }

      cb.addEventListener('change', () => {
        if (checklist[scene.id]?.[item.id]) checklist[scene.id][item.id].checked = cb.checked;
        lbl.classList.toggle('checked', cb.checked);
        updateProgress(scene);
        if (group.label) updateGroupCount(scene.id, gi, group);
      });

      section.appendChild(wrapper);
    });
    panel.appendChild(section);
  });

  // Inject touch measurement section
  if (scene.id === 'inspection') {
    // After all groups (after タッチ・音チェック group)
    panel.appendChild(buildTouchSection('inspection'));
  } else if (scene.id === 'final') {
    // After group 0 (totalCheck/polish), before Disklavier group
    const ref = groupEls[1]; // Disklavier group
    const ts  = buildTouchSection('final');
    if (ref) panel.insertBefore(ts, ref);
    else     panel.appendChild(ts);
  }
}

function updateProgress(scene) {
  const st = checklist[scene.id] || {};
  let done = 0, total = 0;
  scene.groups.forEach(g => {
    if (g.isDkSection && !isDK) return;
    g.items.forEach(item => { total++; if (st[item.id]?.checked) done++; });
  });
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  const pf = document.getElementById('pf-' + scene.id);
  const pt = document.getElementById('pt-' + scene.id);
  if (pf) pf.style.width = pct + '%';
  if (pt) pt.textContent = done + ' / ' + total;
}

function updateTuningProgress() {
  const n = [tuningData.pitchBefore, tuningData.pitchAfter].filter(Boolean).length;
  const pf = document.getElementById('pf-tuning'), pt = document.getElementById('pt-tuning');
  if (pf) pf.style.width = Math.round(n / 2 * 100) + '%';
  if (pt) pt.textContent = n + ' / 2';
}

/* =====================================================
   TOUCH MEASUREMENT
===================================================== */
function getBalanceWeightRating(bw) {
  if (bw < 28) return { en: 'Extremely Low',  ja: '極めて低い', cls: 'tb-extreme' };
  if (bw < 33) return { en: 'Low',             ja: '低い',       cls: 'tb-caution' };
  if (bw <= 39) return { en: 'Normal',          ja: '標準',       cls: 'tb-normal'  };
  if (bw <= 46) return { en: 'High',            ja: '高い',       cls: 'tb-caution' };
  return               { en: 'Extremely High',  ja: '極めて高い', cls: 'tb-extreme' };
}
function getFrictionRating(f) {
  if (f < 6)  return { en: 'Extremely Low',  ja: '極めて低い', cls: 'tb-extreme' };
  if (f < 9)  return { en: 'Low',             ja: '低い',       cls: 'tb-caution' };
  if (f <= 15) return { en: 'Normal',          ja: '標準',       cls: 'tb-normal'  };
  if (f <= 17) return { en: 'High',            ja: '高い',       cls: 'tb-caution' };
  return              { en: 'Extremely High',  ja: '極めて高い', cls: 'tb-extreme' };
}

function buildTouchSection(phase) {
  const isJA  = lang !== 'en';
  const LABELS = {
    hd:    isJA ? 'タッチ測定' : 'Touch Measurement',
    dw:    isJA ? 'ダウンウェイト'      : 'Down Weight',
    uw:    isJA ? 'アップウェイト'      : 'Up Weight',
    bw:    isJA ? 'バランスウェイト'    : 'Balance Weight',
    fr:    isJA ? 'フリクション'        : 'Friction',
    bwRat: isJA ? 'バランスウェイト評価': 'BW Rating',
    frRat: isJA ? 'フリクション評価'    : 'Friction Rating',
  };

  const sec = document.createElement('div');
  sec.className = 'touch-section';
  sec.id = 'ts-' + phase;

  const hd = document.createElement('div');
  hd.className = 'touch-section-hd';
  hd.textContent = LABELS.hd;
  sec.appendChild(hd);

  function makeInputRow(label, inputId) {
    const row  = document.createElement('div'); row.className = 'touch-row';
    const lb   = document.createElement('span'); lb.className = 'touch-label'; lb.textContent = label;
    const ctrl = document.createElement('div');  ctrl.className = 'touch-ctrl';
    const inp  = document.createElement('input');
    inp.type = 'number'; inp.className = 'touch-input'; inp.id = inputId;
    inp.step = '0.5'; inp.min = '0'; inp.placeholder = '—';
    const unit = document.createElement('span'); unit.className = 'touch-unit'; unit.textContent = 'g';
    ctrl.appendChild(inp); ctrl.appendChild(unit);
    row.appendChild(lb); row.appendChild(ctrl);
    return { row, inp };
  }

  function makeResultRow(label, resultId) {
    const row  = document.createElement('div'); row.className = 'touch-row';
    const lb   = document.createElement('span'); lb.className = 'touch-label'; lb.textContent = label;
    const ctrl = document.createElement('div');  ctrl.className = 'touch-ctrl';
    const res  = document.createElement('span'); res.className = 'touch-result'; res.id = resultId; res.textContent = '—';
    const unit = document.createElement('span'); unit.className = 'touch-unit'; unit.textContent = 'g';
    ctrl.appendChild(res); ctrl.appendChild(unit);
    row.appendChild(lb); row.appendChild(ctrl);
    return row;
  }

  function makeRatingRow(label, badgeId) {
    const row  = document.createElement('div'); row.className = 'touch-row';
    const lb   = document.createElement('span'); lb.className = 'touch-label'; lb.textContent = label;
    const bdg  = document.createElement('span'); bdg.className = 'touch-badge tb-none'; bdg.id = badgeId; bdg.textContent = '—';
    row.appendChild(lb); row.appendChild(bdg);
    return row;
  }

  const { row: dwRow, inp: dwInp } = makeInputRow(LABELS.dw, 'tw-' + phase + '-dw');
  const { row: uwRow, inp: uwInp } = makeInputRow(LABELS.uw, 'tw-' + phase + '-uw');
  sec.appendChild(dwRow);
  sec.appendChild(uwRow);
  sec.appendChild(makeResultRow(LABELS.bw, 'tw-' + phase + '-bw'));
  sec.appendChild(makeResultRow(LABELS.fr, 'tw-' + phase + '-fr'));
  sec.appendChild(makeRatingRow(LABELS.bwRat, 'tw-' + phase + '-bwr'));
  sec.appendChild(makeRatingRow(LABELS.frRat, 'tw-' + phase + '-frr'));

  const update = () => {
    const dw = parseFloat(dwInp.value);
    const uw = parseFloat(uwInp.value);
    touchData[phase === 'inspection' ? 'inspectionDW' : 'finalDW'] = dwInp.value;
    touchData[phase === 'inspection' ? 'inspectionUW' : 'finalUW'] = uwInp.value;
    calcTouchDisplay(phase, dw, uw);
  };
  dwInp.addEventListener('input', update);
  uwInp.addEventListener('input', update);
  return sec;
}

function calcTouchDisplay(phase, dw, uw) {
  const bwEl  = document.getElementById('tw-' + phase + '-bw');
  const frEl  = document.getElementById('tw-' + phase + '-fr');
  const bwrEl = document.getElementById('tw-' + phase + '-bwr');
  const frrEl = document.getElementById('tw-' + phase + '-frr');
  if (!bwEl) return;

  const valid = !isNaN(dw) && !isNaN(uw) && dw > 0 && uw > 0;
  if (!valid) {
    bwEl.textContent = '—'; frEl.textContent = '—';
    [bwrEl, frrEl].forEach(el => { if (el) { el.textContent = '—'; el.className = 'touch-badge tb-none'; } });
    return;
  }

  const bw = (dw + uw) / 2;
  const fr = (dw - uw) / 2;
  bwEl.textContent = bw.toFixed(1);
  frEl.textContent = fr.toFixed(1);

  const bwRat = getBalanceWeightRating(bw);
  const frRat = getFrictionRating(fr);
  if (bwrEl) { bwrEl.textContent = lang === 'en' ? bwRat.en : bwRat.ja; bwrEl.className = 'touch-badge ' + bwRat.cls; }
  if (frrEl) { frrEl.textContent = lang === 'en' ? frRat.en : frRat.ja; frrEl.className = 'touch-badge ' + frRat.cls; }
}

function restoreTouchUI(phase) {
  const dwEl = document.getElementById('tw-' + phase + '-dw');
  const uwEl = document.getElementById('tw-' + phase + '-uw');
  if (!dwEl || !uwEl) return;
  const dw = touchData[phase === 'inspection' ? 'inspectionDW' : 'finalDW'] || '';
  const uw = touchData[phase === 'inspection' ? 'inspectionUW' : 'finalUW'] || '';
  dwEl.value = dw; uwEl.value = uw;
  calcTouchDisplay(phase, parseFloat(dw), parseFloat(uw));
}

function updateDkVisibility() {
  document.querySelectorAll('.dk-section').forEach(el => {
    el.style.display = isDK ? 'block' : 'none';
  });
  getScenes().forEach(scene => {
    if (scene.type === 'form') return;
    const ptEl = document.getElementById('pt-' + scene.id);
    if (ptEl) updateProgress(scene);
  });
}

function updateHighlights() {
  const wt = currentWorkType;
  // recording uses the same highlight tags as concert
  const effectiveWt = (wt === 'recording') ? 'concert' : wt;
  getScenes().forEach(scene => {
    if (scene.type === 'form') return;
    scene.groups.forEach((group, gi) => {
      let anyMatch = !wt;
      group.items.forEach(item => {
        const el = document.getElementById('iw-' + scene.id + '-' + item.id);
        if (!el) return;
        if (!wt) {
          el.classList.remove('item-hl', 'item-gray');
        } else {
          const match = (item.tags || []).includes(effectiveWt);
          el.classList.toggle('item-hl',   match);
          el.classList.toggle('item-gray', !match);
          if (match) anyMatch = true;
        }
      });
      if (group.label) {
        const gh = document.getElementById('gh-' + scene.id + '-' + gi);
        if (gh) {
          if (!wt) { gh.classList.remove('gh-hl', 'gh-gray'); }
          else { gh.classList.toggle('gh-hl',   anyMatch); gh.classList.toggle('gh-gray', !anyMatch); }
        }
      }
    });
  });
}

function collectFormData() {
  const date      = document.getElementById('f-date').value;
  const typeEl    = document.querySelector('input[name="piano-type"]:checked');
  const type      = typeEl ? typeEl.value : '';
  const maker     = document.getElementById('f-maker').value.trim();
  const model     = document.getElementById('f-model').value.trim();
  const serial    = document.getElementById('f-serial').value.trim();
  const lastTuned = document.getElementById('f-last-tuned').value;
  const workType  = document.getElementById('f-work-type').value;
  const customer  = document.getElementById('f-customer').value.trim();
  const location  = document.getElementById('f-location').value.trim();
  const staff     = document.getElementById('f-staff').value.trim();
  const clientType = document.getElementById('f-client-type').value;
  const memo      = document.getElementById('f-memo').value.trim();
  const techNote  = document.getElementById('f-tech-note').value.trim();
  const disklavier = document.getElementById('f-disklavier').checked;
  return { date, type, maker, model, serial, lastTuned, workType, customer, clientType, location, staff, memo, techNote, disklavier };
}

function performSave(isAuto) {
  const fd = collectFormData();
  if (!fd.date) { if (!isAuto) toast(t('valDate')); return; }
  if (!fd.type) { if (!isAuto) toast(t('valType')); return; }

  const recData = { ...fd,
    checklist:  JSON.parse(JSON.stringify(checklist)),
    tuningData: JSON.parse(JSON.stringify(tuningData)),
    touchData:  JSON.parse(JSON.stringify(touchData)),
    evaluation: JSON.parse(JSON.stringify(evaluation)),
    savedAt:    new Date().toISOString() };

  if (editingId) {
    const idx = records.findIndex(r => r.id === editingId);
    if (idx !== -1) {
      const wasExported = records[idx].markdown_exported;
      records[idx] = { ...records[idx], ...recData };
      if (wasExported) { records[idx].markdown_exported = false; records[idx].edited_after_export = true; }
    }
  } else {
    const newId = Date.now().toString();
    records.unshift({ id: newId, ...recData });
    editingId = newId;
    document.getElementById('btn-save').textContent = t('btnUpdate');
  }
  save();
  updateNavCount();
  buildAllDataLists();
  isDirty = false;
  clearTimeout(autoSaveTimer);
  toast(t(isAuto ? 'toastAutoSaved' : 'toastSaved'));
}

function clearForm() {
  editingId = null; isDirty = false; clearTimeout(autoSaveTimer);
  document.getElementById('f-date').value = todayStr();
  document.querySelectorAll('input[name="piano-type"]').forEach(r => r.checked = false);
  ['f-maker','f-model','f-serial','f-last-tuned','f-work-type','f-customer','f-location','f-memo','f-tech-note'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('f-client-type').value = 'artist';
  document.getElementById('f-staff').value = 'Shinya Maeda';
  document.getElementById('f-disklavier').checked = false;
  currentPianoType = 'grand'; currentWorkType = ''; isDK = false;
  initChecklist(); buildScenes(); resetEvalForm();
  document.getElementById('btn-save').textContent = t('btnSave');
}

function markDirty() {
  isDirty = true;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => { if (isDirty) performSave(true); }, 5000);
}

document.getElementById('btn-save').addEventListener('click', () => performSave(false));
// dirty tracking — delegate on entire new-record view
document.getElementById('view-new').addEventListener('input',  markDirty);
document.getElementById('view-new').addEventListener('change', markDirty);

function renderList() {
  const ft  = document.getElementById('filter-type').value;
  const q   = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const con = document.getElementById('records-list');
  con.innerHTML = '';
  let filtered = ft ? records.filter(r => r.workType === ft) : records;
  if (q) {
    filtered = filtered.filter(r => {
      const tags = computeAutoTags(r).join(' ');
      return [r.customer, r.maker, r.model, r.serial, r.location, r.staff, r.workType, r.memo, tags]
        .filter(Boolean).join(' ').toLowerCase().includes(q);
    });
  }
  document.getElementById('list-heading').textContent = t('listHeading', filtered.length);
  if (!filtered.length) {
    con.innerHTML = `<div class="empty-state"><h3>${t('listEmpty')}</h3><p>${t('listEmptySub')}</p></div>`;
    return;
  }
  const MAX_TAGS = 3;
  filtered.forEach(rec => {
    const [y, m, d] = rec.date.split('-');
    const pct = calcPct(rec);

    // 楽器表示: model #serial → model → pianoLabel
    const instrument = rec.model
      ? esc(rec.model) + (rec.serial ? ' #' + esc(rec.serial) : '')
      : esc(pianoLabel(rec.type));
    const metaLine = instrument + (rec.workType ? ' · ' + esc(workTypeLabel(rec.workType)) : '');

    // タグ表示 (computeAutoTags を使用)
    const autoTags   = computeAutoTags(rec);
    const shownTags  = autoTags.slice(0, MAX_TAGS);
    const extraCount = autoTags.length - MAX_TAGS;
    const tagsHtml   = autoTags.length
      ? '<div class="rc-tags">' +
        shownTags.map(tag => `<span class="rc-tag">#${esc(tag)}</span>`).join('') +
        (extraCount > 0 ? `<span class="rc-tag rc-tag-more">+${extraCount}</span>` : '') +
        '</div>'
      : '';

    const mdState = rec.edited_after_export ? 'needs' : rec.markdown_exported ? 'exported' : null;
    const mdBadge = mdState
      ? `<span class="rc-md-badge rc-badge-${mdState}">${mdState === 'needs' ? t('needsExportBadge') : t('mdExportedBadge')}</span>`
      : '';

    const card = document.createElement('div');
    card.className = 'record-card' + (mdState === 'exported' ? ' rc-md-exported' : mdState === 'needs' ? ' rc-needs-export' : '');
    card.innerHTML = `
      <div class="date-badge"><div class="ym">${y}/${m}</div><div class="dd">${d}</div></div>
      <div class="record-info">
        <div class="record-title">${esc(rec.customer || t('noClient'))}</div>
        <div class="record-meta">
          <span class="rc-instrument">${metaLine}</span>
          ${rec.disklavier ? `<span>${t('diskMeta')}</span>` : ''}
        </div>
        ${tagsHtml}${mdBadge}
      </div>
      <div class="completion-badge"><div class="completion-pct">${pct}%</div><div class="completion-lbl">${t('pctDone')}</div></div>`;
    card.addEventListener('click', () => showDetail(rec.id));
    con.appendChild(card);
  });
}

function calcPct(rec) {
  const cl = rec.checklist;
  if (!cl) return 0;
  const firstVal = Object.values(cl)[0];
  // old array format
  if (Array.isArray(firstVal)) {
    let done = 0, total = 0;
    Object.values(cl).forEach(arr => arr.forEach(v => { total++; if (v) done++; }));
    return total === 0 ? 0 : Math.round(done / total * 100);
  }
  const scenes = getScenesFor(rec.type || 'grand');
  let done = 0, total = 0;
  scenes.forEach(scene => {
    if (scene.type === 'form') return;
    const st = cl[scene.id] || {};
    if (Array.isArray(st)) { st.forEach(v => { total++; if (v) done++; }); return; }
    scene.groups.forEach(g => {
      if (g.isDkSection && !rec.disklavier) return;
      g.items.forEach(item => { total++; if (st[item.id]?.checked) done++; });
    });
  });
  return total === 0 ? 0 : Math.round(done / total * 100);
}

function showDetail(id) {

  const [y, m, d] = rec.date.split('-');
  const pct    = calcPct(rec);
  const scenes = getScenesFor(rec.type);
  let   scenesHtml = '';

  scenes.forEach(scene => {
    if (scene.type === 'form') {
      const td = rec.tuningData || {};
      const rows = [
        [t('tfPitchBefore'), td.pitchBefore ? td.pitchBefore + ' Hz' : ''],
        [t('tfPitchAfter'),  td.pitchAfter  ? td.pitchAfter  + ' Hz' : ''],
        [t('tfPreLabel'),  td.preCondition], [t('tfPostLabel'), td.postComment],
        [t('tunePin'),     td.stringPinMemo],
      ].filter(([, v]) => v);
      scenesHtml += `<div class="detail-scene"><div class="detail-scene-hd"><span>${esc(sName(scene))}</span></div>${
        rows.length ? rows.map(([l, v]) => `<div class="tuning-summary-row"><span class="ts-label">${l}</span><span class="ts-value">${esc(String(v))}</span></div>`).join('')
                    : `<div style="color:var(--muted);font-size:13px;padding:8px 0">${t('emptyTuning')}</div>`
      }</div>`;
      return;
    }

    const sceneState = (rec.checklist || {})[scene.id] || {};
    const isOldArr   = Array.isArray(sceneState);

    if (isOldArr) {
      const done = sceneState.filter(Boolean).length;
      scenesHtml += `<div class="detail-scene"><div class="detail-scene-hd"><span>${esc(sName(scene))}</span><span>${done} / ${sceneState.length}</span></div>${
        sceneState.map((v, i) => `<div class="detail-item ${v ? '' : 'unchecked'}"><div class="check-dot ${v ? 'yes' : 'no'}">${v ? '✓' : ''}</div><span>項目 ${i + 1}</span></div>`).join('')
      }</div>`;
      return;
    }

    let sceneDone = 0, sceneTotal = 0;
    scene.groups.forEach(g => {
      if (g.isDkSection && !rec.disklavier) return;
      g.items.forEach(item => { sceneTotal++; if (sceneState[item.id]?.checked) sceneDone++; });
    });

    let groupsHtml = '';
    scene.groups.forEach((group, gi) => {
      if (group.isDkSection && !rec.disklavier) return;
      const wt   = rec.workType;
      const effectiveWt = (wt === 'recording') ? 'concert' : wt;
      const anyMatch = group.items.some(item => (item.tags || []).includes(effectiveWt));

function renderEvalDetail(ev) {
  if (!ev) return '';
  const rows = getEvalSliders().map(({ key, label, hint }) => {
    const b = ev[key]?.before ?? 3, a = ev[key]?.after ?? 3;
    const memo = ev[key]?.memo || '';
    return `<tr><td>${esc(label)}<br><small style="font-size:10px;color:var(--muted)">${esc(hint)}</small></td><td>${b}</td><td>${a}</td></tr>`
      + (memo ? `<tr><td colspan="3" style="font-size:12px;color:var(--muted);padding:0 0 8px 2px">↳ ${esc(memo)}</td></tr>` : '');
  }).join('');
  const ov  = ev.overall ? overallLabel(ev.overall) : '';
  const ovc = ev.overall === 'satisfied' ? 'var(--success)' : ev.overall === 'needs-improvement' ? 'var(--danger)' : 'var(--text)';
  return `<div class="card"><div class="card-title">${t('detailEvalTitle')}</div>
    <div class="eval-section-hd">${t('detailEvalSelf')}</div>
    <table class="detail-eval-table"><thead><tr><th></th><th>${t('evalBefore')}</th><th>${t('evalAfter')}</th></tr></thead><tbody>${rows}</tbody></table>
    ${ev.positive || ev.negative ? `<div class="eval-section-hd" style="margin-top:16px">${t('detailFeedHd')}</div>
    ${ev.positive ? `<div style="margin-bottom:10px"><div class="ts-label" style="margin-bottom:4px">${t('detailPosFb')}</div><div class="memo-box" style="font-size:13px">${esc(ev.positive)}</div></div>` : ''}
    ${ev.negative ? `<div><div class="ts-label" style="margin-bottom:4px">${t('detailNegFb')}</div><div class="memo-box" style="font-size:13px">${esc(ev.negative)}</div></div>` : ''}` : ''}
    ${ov ? `<div style="margin-top:14px;font-size:14px;font-weight:700;color:${ovc}">${t('detailOverall', ov)}</div>` : ''}</div>`;
}

function initEvaluation() {
  evaluation = {
    touch:{before:3,after:3,memo:''}, repetition:{before:3,after:3,memo:''}, volume:{before:3,after:3,memo:''},
    tone_color:{before:3,after:3,memo:''}, intonation:{before:3,after:3,memo:''},
    dynamics_curve:{before:3,after:3,memo:''}, evenness:{before:3,after:3,memo:''},
    positive:'', negative:'', overall:''
  };
}
function initEvalListeners() {
  EVAL_SLIDERS.forEach(({ key }) => {
    ['before', 'after'].forEach(phase => {
      const sl = document.getElementById('sl-' + key + '-' + phase);
      const sv = document.getElementById('sv-' + key + '-' + phase);
      if (!sl) return;
      sl.addEventListener('input', () => {
        if (!evaluation[key]) evaluation[key] = { before:3, after:3, memo:'' };
        evaluation[key][phase] = +sl.value;
        if (sv) sv.textContent = sl.value;
      });
    });
    const em = document.getElementById('em-' + key);
    if (em) em.addEventListener('input', () => {
      if (!evaluation[key]) evaluation[key] = { before:3, after:3, memo:'' };
      evaluation[key].memo = em.value;
    });
  });
  document.getElementById('ef-positive').addEventListener('input', e => { evaluation.positive = e.target.value; });
  document.getElementById('ef-negative').addEventListener('input', e => { evaluation.negative = e.target.value; });
  document.querySelectorAll('input[name="overall-rating"]').forEach(rb => rb.addEventListener('change', () => { evaluation.overall = rb.value; }));
}
function resetEvalForm() {
  initEvaluation();
  EVAL_SLIDERS.forEach(({ key }) => {
    ['before', 'after'].forEach(phase => {
      const sl = document.getElementById('sl-' + key + '-' + phase);
      const sv = document.getElementById('sv-' + key + '-' + phase);
      if (sl) sl.value = 3;
      if (sv) sv.textContent = '3';
    });
    const em = document.getElementById('em-' + key);
    if (em) em.value = '';
  });
  const efp = document.getElementById('ef-positive');
  const efn = document.getElementById('ef-negative');
  if (efp) efp.value = '';
  if (efn) efn.value = '';
  document.querySelectorAll('input[name="overall-rating"]').forEach(r => r.checked = false);
}
