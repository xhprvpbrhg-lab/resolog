function buildSummaryItems(rec) {
  const cl = rec.checklist || {};
  const items = [];
  // Virtual items from tuning form
  const tdS = rec.tuningData || {};
  if (tdS.pitchAfter || tdS.pitchBefore) {
    const after = tdS.pitchAfter || '—', before = tdS.pitchBefore || '—';
    const pitchText = (before && before !== after && before !== '—')
      ? 'Tuning from ' + before + ' to ' + after + 'Hz'
      : 'Tuning at ' + (after || '?') + 'Hz';
    items.push({ id: 'tuning.pitch', label: 'Pitch', completed: true, included: true, text: pitchText, userEdited: false });
  }
  if (tdS.preCondition)  items.push({ id: 'tuning.pre',  label: '調律前', completed: true, included: true, text: '調律前: '  + tdS.preCondition,  userEdited: false });
  if (tdS.postComment)   items.push({ id: 'tuning.post', label: '調律後', completed: true, included: true, text: '調律後: '  + tdS.postComment,   userEdited: false });
  if (tdS.stringPinMemo) items.push({ id: 'tuning.pin',  label: '弦・ピン', completed: true, included: true, text: '弦・ピン: ' + tdS.stringPinMemo, userEdited: false });
  getScenesFor(rec.type).forEach(scene => {
    if (scene.type === 'form') return;
    const ss = cl[scene.id] || {};
    if (Array.isArray(ss)) return;
    scene.groups.forEach((g, gi) => {
      if (g.isDkSection && !rec.disklavier) return;

      // ネジ増し締めグループ → 個別項目ではなくグループ単位でSummaryに追加
      if (g.enLabel === 'Tightening Screws') {
        const anyChecked = g.items.some(i => (ss[i.id] || {}).checked);
        if (!anyChecked) return;
        const memos = g.items.map(i => (ss[i.id] || {}).memo || '').filter(Boolean);
        const label  = gLabel(g);
        const text   = memos.length ? label + ' (' + memos.join('; ') + ')' : label;
        items.push({ id: scene.id + '.tightening.' + gi, label, completed: true, included: true, text, userEdited: false });
        return;
      }

      g.items.forEach(item => {
        const st = ss[item.id] || {};
        const completed = !!st.checked;
        let defaultText = iLabel(item);
        if (item.hasMm && st.mm) {
          const zl = { bass: t('zoneBass'), mid: t('zoneMid'), treble: t('zoneTreble') };
          const parts = ['bass','mid','treble'].map(z => {
            const b = st.mm[z]?.before, a = st.mm[z]?.after;
            return (b || a) ? zl[z] + ' ' + (b||'—') + '→' + (a||'—') + 'mm' : null;
          }).filter(Boolean);
          if (parts.length) defaultText += '（' + parts.join(' / ') + '）';
          if (st.memo) defaultText += ' (' + st.memo + ')';
        } else if (item.hasMemo && st.memo) {
          defaultText += ' (' + st.memo + ')';
        } else if (item.hasClimate && (st.temp || st.humidity)) {
          const parts = [st.temp && st.temp + '℃', st.humidity && st.humidity + '%'].filter(Boolean);
          defaultText += ' (' + parts.join(' / ') + ')';
        }
        const hasMemo = !!(st.memo || (item.hasMm && st.mm && ['bass','mid','treble'].some(z => st.mm[z]?.before || st.mm[z]?.after)));
        if (!completed && !hasMemo) return;
        items.push({ id: scene.id + '.' + item.id, label: iLabel(item), completed, included: true, text: defaultText, userEdited: false });
      });
    });
  });
  // Evaluation memo items — only added when a memo is present (slider numbers are intentionally excluded)
  const ev = rec.evaluation || {};
  EVAL_SLIDERS.forEach(({ key }) => {
    const entry = ev[key];
    if (!entry) return;
    const memo = (entry.memo || '').trim();
    if (!memo) return;
    const label = t('sl' + slKey(key));
    items.push({ id: 'eval.' + key, label, completed: true, included: true, text: label + ' (' + memo + ')', userEdited: false });
  });
  return items;
}

  if (!summaryItems.length) return '';
  const rows = summaryItems.map((it, i) =>
    `<div class="sb-item${it.included ? '' : ' sb-excluded'}" data-idx="${i}">` +
    `<input type="checkbox" class="sb-include" data-idx="${i}"${it.included ? ' checked' : ''}>` +
    `<input type="text" class="sb-text" data-idx="${i}" value="${it.text.replace(/"/g, '&quot;').replace(/</g, '&lt;')}">` +
    `<div class="sb-btns">` +
    `<button class="sb-move" data-idx="${i}" data-dir="up"${i === 0 ? ' disabled' : ''}>↑</button>` +
    `<button class="sb-move" data-idx="${i}" data-dir="down"${i === summaryItems.length - 1 ? ' disabled' : ''}>↓</button>` +
    `</div></div>`
  ).join('');
  const inc = summaryItems.filter(it => it.included).length;
  return `<div class="card" id="summary-builder-card">` +
    `<div class="card-title">Summary Builder</div>` +
    `<div class="sb-toolbar">` +
    `<span class="sb-toolbar-info">${t('sbInfo', inc, summaryItems.length)}</span>` +
    `</div>` +
    `<div class="sb-list" id="sb-list">${rows}</div>` +
    `<div class="sb-preview-area">` +
    `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">` +
    `<div class="sb-preview-label" style="margin-bottom:0">${t('sbPreview')}</div>` +
    `<button class="btn-ghost" id="sb-copy" style="font-size:12px;padding:5px 12px">${t('sbCopy')}</button>` +
    `</div>` +
    `<div class="sb-preview" id="sb-preview"></div>` +
    `</div></div>`;
}

function buildSummaryPreview(rec) {
  return summaryItems.filter(it => it.included).map(it => '- ' + it.text).join('\n');
}

function updateSummaryPreview(rec) {
  const el = document.getElementById('sb-preview');
  if (el) el.textContent = buildSummaryPreview(rec);
  const info = document.querySelector('.sb-toolbar-info');
  if (info) info.textContent = summaryItems.filter(it => it.included).length + ' / ' + summaryItems.length + ' 項目を出力';
}

function rebuildSummaryList(rec) {
  const list = document.getElementById('sb-list');
  if (!list) return;
  list.innerHTML = summaryItems.map((it, i) =>
    `<div class="sb-item${it.included ? '' : ' sb-excluded'}" data-idx="${i}">` +
    `<input type="checkbox" class="sb-include" data-idx="${i}"${it.included ? ' checked' : ''}>` +
    `<input type="text" class="sb-text" data-idx="${i}" value="${it.text.replace(/"/g, '&quot;').replace(/</g, '&lt;')}">` +
    `<div class="sb-btns">` +
    `<button class="sb-move" data-idx="${i}" data-dir="up"${i === 0 ? ' disabled' : ''}>↑</button>` +
    `<button class="sb-move" data-idx="${i}" data-dir="down"${i === summaryItems.length - 1 ? ' disabled' : ''}>↓</button>` +
    `</div></div>`
  ).join('');
  attachSummaryListeners(rec);
  updateSummaryPreview(rec);
}

function attachSummaryListeners(rec) {
  document.querySelectorAll('.sb-include').forEach(cb => {
    cb.addEventListener('change', e => {
      const idx = +e.target.dataset.idx;
      summaryItems[idx].included = e.target.checked;
      e.target.closest('.sb-item').classList.toggle('sb-excluded', !e.target.checked);
      updateSummaryPreview(rec);
    });
  });
  document.querySelectorAll('.sb-text').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = +e.target.dataset.idx;
      summaryItems[idx].text = e.target.value;
      summaryItems[idx].userEdited = true;
      updateSummaryPreview(rec);
    });
  });
  document.querySelectorAll('.sb-move').forEach(btn => {
    btn.addEventListener('click', e => {
      const b = e.target;
      const idx = +b.dataset.idx, dir = b.dataset.dir;
      const swap = dir === 'up' ? idx - 1 : idx + 1;
      if (swap < 0 || swap >= summaryItems.length) return;
      [summaryItems[idx], summaryItems[swap]] = [summaryItems[swap], summaryItems[idx]];
      rebuildSummaryList(rec);
    });
  });
}

/* =====================================================
   TAGS
===================================================== */
function normalizeTag(raw) {
  return raw.trim().toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
}

function computeAutoTags(rec) {
  const tags = new Set();
  const wt = rec.workType;
  if (wt === 'concert')                              { tags.add('tuning'); tags.add('concert'); }
  else if (wt === 'regular' || wt === 'pitch-raise') { tags.add('tuning'); }
  else if (wt === 'recording')                       { tags.add('recording'); }
  else if (wt === 'inspection')                      { tags.add('inspection'); }
  const cl = rec.checklist || {};
  const anyChecked = id => { const ss = cl[id]; return ss && typeof ss === 'object' && !Array.isArray(ss) && Object.values(ss).some(s => s?.checked); };
  if (anyChecked('action'))     tags.add('regulation');
  if (anyChecked('voicing'))    tags.add('voicing');
  if (rec.evaluation?.positive || rec.evaluation?.negative) tags.add('client_feedback');
  if (rec.techNote) tags.add('technical_discovery');
  if (rec.disklavier) tags.add('disklavier');
  return [...tags];
}

function renderTagChips() {
  const extra = [...activeTags].filter(t => !STANDARD_TAGS.includes(t));
  return [...STANDARD_TAGS, ...extra].map(tag => {
    const on = activeTags.has(tag), cust = !STANDARD_TAGS.includes(tag);
    return `<span class="tag-chip${on ? ' tc-active' : ''}${cust ? ' tc-custom' : ''}" data-tag="${tag}">${tag}${cust ? ' ×' : ''}</span>`;
  }).join('');
}

function refreshTagChips() {
  const el = document.getElementById('tag-chips');
  if (el) el.innerHTML = renderTagChips();
}

function updateTagPreview() {
  const el = document.getElementById('tag-yaml-preview');
  if (!el) return;
  const tags = [...activeTags].sort();
  el.textContent = tags.length ? 'tags:\n' + tags.map(t => '  - ' + t).join('\n') : '（タグなし）';
}

function renderTagsHTML() {
  const autoList = computeAutoTags(currentDetailRec || {});
  const autoInfo = autoList.length ? '自動検出: ' + autoList.join(', ') : '自動検出なし';
  return `<div class="card" id="tags-card">` +
    `<div class="card-title">${t('tagTitle')}</div>` +
    `<div style="font-size:11px;color:var(--muted);margin-bottom:10px">${esc(autoInfo)}</div>` +
    `<div class="tag-chips" id="tag-chips">${renderTagChips()}</div>` +
    `<div class="tag-input-row">` +
    `<input type="text" id="tag-input" placeholder="任意タグを追加… (例: steinway_d)">` +
    `<button class="btn-ghost" id="tag-add" style="white-space:nowrap;font-size:12px;padding:7px 13px">追加</button>` +
    `</div>` +
    `<div class="tag-yaml-preview" id="tag-yaml-preview"></div>` +
    `</div>`;
}

function attachTagListeners() {
  const chips = document.getElementById('tag-chips');
  if (!chips) return;
  chips.addEventListener('click', e => {
    const chip = e.target.closest('.tag-chip');
    if (!chip) return;
    const tag = chip.dataset.tag;
    if (!STANDARD_TAGS.includes(tag)) { activeTags.delete(tag); customTags.delete(tag); }
    else { activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag); }
    refreshTagChips();
    updateTagPreview();
  });
  const doAdd = () => {
    const inp = document.getElementById('tag-input');
    const tag = normalizeTag(inp.value);
    if (!tag) return;
    activeTags.add(tag);
    if (!STANDARD_TAGS.includes(tag)) customTags.add(tag);
    inp.value = '';
    refreshTagChips();
    updateTagPreview();
  };
  document.getElementById('tag-add').addEventListener('click', doAdd);
  document.getElementById('tag-input').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doAdd(); } });
}

/* =====================================================
   RELATED NOTES
===================================================== */
function buildRelatedNotes(rec) {
  const notes = [];
  const DV  = q => '```dataview\n' + q + '\n```';
  // ref() uses the file-safe name so internal links match the actual filename
  const ref = fn => obsidianMode ? '[[' + fn + ']]' : '"' + fn + '"';

  if (rec.customer) {
    const n  = rec.customer;                   // display name (untouched)
    const fn = sanitizeFileName(n);            // file-safe name
    const fm = ['---', 'type: client', 'name: ' + n];
    if (rec.clientType) fm.push('client_type: ' + rec.clientType);
    fm.push('tags:\n  - client', '---');
    const content = fm.join('\n') + '\n\n# ' + n + '\n\n## Related Logs\n\n' +
      DV('LIST FROM "20_Tuning/Sessions"\nWHERE client = ' + ref(fn) + '\nSORT date DESC');
    notes.push({ type: 'client', label: 'Client', name: n, path: 'Clients/' + fn + '.md', content });
  }

  if (rec.location) {
    const n  = rec.location;
    const fn = sanitizeFileName(n);
    const content = '---\ntype: venue\nname: ' + n + '\ntags:\n  - venue\n---\n\n# ' + n +
      '\n\n## Related Logs\n\n' + DV('LIST FROM "20_Tuning/Sessions"\nWHERE venue = ' + ref(fn) + '\nSORT date DESC');
    notes.push({ type: 'venue', label: 'Venue', name: n, path: 'Venues/' + fn + '.md', content });
  }

  const assetStr = [rec.maker, rec.model, rec.serial].filter(Boolean).join(' ');
  if (assetStr) {
    const n  = assetStr;
    const fn = sanitizeFileName(n);
    const fm = ['---', 'type: asset', 'asset_type: piano'];
    if (rec.maker)  fm.push('make: ' + rec.maker);
    if (rec.model)  fm.push('model: ' + rec.model);
    if (rec.serial) fm.push('serial_number: ' + rec.serial);
    fm.push('tags:\n  - asset\n  - piano', '---');
    const content = fm.join('\n') + '\n\n# ' + n + '\n\n## Related Logs\n\n' +
      DV('LIST FROM "20_Tuning/Sessions"\nWHERE asset = ' + ref(fn) + '\nSORT date DESC');
    notes.push({ type: 'asset', label: 'Asset', name: n, path: 'Assets/' + fn + '.md', content });
  }

  return notes;
}

function renderRelatedNotesHTML(rec) {
  const notes = buildRelatedNotes(rec);
  if (!notes.length) return '';
  const escRaw = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const rows = notes.map((note, i) =>
    `<div class="rn-note">` +
    `<div class="rn-note-header">` +
    `<div><div class="rn-note-title">${esc(note.label)} — ${esc(note.name)}</div>` +
    `<div class="rn-note-path">${esc(note.path)}</div></div>` +
    `<button class="btn-ghost rn-copy" data-idx="${i}" style="font-size:12px;padding:5px 12px;flex-shrink:0">コピー</button>` +
    `</div>` +
    `<div class="rn-preview">${escRaw(note.content)}</div>` +
    `</div>`
  ).join('');
  return `<div class="card" id="related-notes-section">` +
    `<div class="card-title">${t('rnTitle')}</div>` +
    `<div class="rn-toolbar">` +
    `<span class="sb-toolbar-info">${t('rnInfo', notes.length, obsidianMode)}</span>` +
    `<button class="btn-ghost" id="rn-copy-all" style="font-size:12px;padding:6px 12px">${lang === 'en' ? 'Copy All' : 'すべてコピー'}</button>` +
    `</div>` +
    `<div>${rows}</div>` +
    `</div>`;
}

function attachRelatedNotesListeners(rec) {
  const notes = buildRelatedNotes(rec);
  if (!notes.length) return;
  const all = notes.map(n => '# File: ' + n.path + '\n\n' + n.content).join('\n\n---\n\n');
  const copyAll = document.getElementById('rn-copy-all');
  if (copyAll) copyAll.addEventListener('click', () =>
    navigator.clipboard.writeText(all).then(() => toast(t('toastCopied'))).catch(() => toast(t('toastCopyFail')))
  );
  document.querySelectorAll('.rn-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      const n = notes[+btn.dataset.idx];
      if (n) navigator.clipboard.writeText(n.content).then(() => toast(t('toastCopied'))).catch(() => toast(t('toastCopyFail')));
    });
  });
}

function restoreChecklistUI() {
  getScenes().forEach(scene => {
    if (scene.type === 'form') return;
    const ss = checklist[scene.id] || {};
    scene.groups.forEach(g => g.items.forEach(item => {
      const st = ss[item.id];
      if (!st) return;
      const wrapper = document.getElementById('iw-' + scene.id + '-' + item.id);
      if (!wrapper) return;
      const cb = wrapper.querySelector('input[type="checkbox"]');
      if (cb && st.checked) { cb.checked = true; cb.closest('.checklist-item').classList.add('checked'); }
      if (item.hasMemo && st.memo) { const m = wrapper.querySelector('.item-memo'); if (m) m.value = st.memo; }
      if (item.hasClimate) {
        const ci = wrapper.querySelectorAll('.climate-input');
        if (ci[0] && st.temp) ci[0].value = st.temp;
        if (ci[1] && st.humidity) ci[1].value = st.humidity;
      }
      if (item.hasMm && st.mm) {
        wrapper.querySelectorAll('.mm-input').forEach(inp => { const v = st.mm[inp.dataset.zone]?.[inp.dataset.phase]; if (v) inp.value = v; });
        const mm = wrapper.querySelector('.item-memo'); if (mm && st.memo) mm.value = st.memo;
      }
    }));
    updateProgress(scene);
  });
  restoreTouchUI('inspection');
  restoreTouchUI('final');
}

function restoreTuningUI() {
  const td = tuningData;
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v || ''; };
  set('tf-pitch-before', td.pitchBefore || '440');
  set('tf-pitch-after',  td.pitchAfter  || '440');
  set('tf-pre',  td.preCondition  || '');
  set('tf-post', td.postComment   || '');
  set('tf-pin',  td.stringPinMemo || '');
  updateTuningProgress();
}

function restoreEvalForm() {
  EVAL_SLIDERS.forEach(({ key }) => {
    ['before', 'after'].forEach(phase => {
      const sl = document.getElementById('sl-' + key + '-' + phase);
      const sv = document.getElementById('sv-' + key + '-' + phase);
      const val = evaluation[key]?.[phase] ?? 3;
      if (sl) sl.value = val;
      if (sv) sv.textContent = val;
    });
    const em = document.getElementById('em-' + key); if (em) em.value = evaluation[key]?.memo || '';
  });
  const efp = document.getElementById('ef-positive'), efn = document.getElementById('ef-negative');
  if (efp) efp.value = evaluation.positive || '';
  if (efn) efn.value = evaluation.negative || '';
  if (evaluation.overall) { const rb = document.querySelector(`input[name="overall-rating"][value="${evaluation.overall}"]`); if (rb) rb.checked = true; }
  else document.querySelectorAll('input[name="overall-rating"]').forEach(r => r.checked = false);
}

function populateFormForEdit(rec) {
  editingId = rec.id;
  document.getElementById('f-date').value = rec.date || todayStr();
  document.querySelectorAll('input[name="piano-type"]').forEach(r => { r.checked = r.value === rec.type; });
  currentPianoType = rec.type || 'grand';
  document.getElementById('f-maker').value   = rec.maker    || '';
  document.getElementById('f-model').value   = rec.model    || '';
  document.getElementById('f-serial').value  = rec.serial   || '';
  document.getElementById('f-last-tuned').value = rec.lastTuned || '';
  document.getElementById('f-work-type').value  = rec.workType  || '';
  document.getElementById('f-customer').value   = rec.customer  || '';
  document.getElementById('f-client-type').value = rec.clientType || 'artist';
  document.getElementById('f-location').value = rec.location || '';
  document.getElementById('f-staff').value    = rec.staff    || 'Shinya Maeda';
  document.getElementById('f-memo').value     = rec.memo     || '';
  document.getElementById('f-tech-note').value = rec.techNote || '';
  document.getElementById('f-disklavier').checked = !!rec.disklavier;
  currentWorkType = rec.workType || '';
  isDK = !!rec.disklavier;
  checklist  = JSON.parse(JSON.stringify(rec.checklist  || {}));
  // Ensure every current scene item has an entry — saved records may lack items
  // added after the record was created, causing silent write failures in listeners
  getScenes().forEach(s => {
    if (s.type === 'form') return;
    if (!checklist[s.id]) checklist[s.id] = {};
    s.groups.forEach(g => g.items.forEach(item => {
      if (!checklist[s.id][item.id]) {
        const st = { checked: false };
        if (item.hasMemo)    st.memo = '';
        if (item.hasClimate) { st.temp = ''; st.humidity = ''; }
        if (item.hasMm)      { st.mm = { bass:{before:'',after:''}, mid:{before:'',after:''}, treble:{before:'',after:''} }; st.memo = ''; }
        checklist[s.id][item.id] = st;
      }
    }));
  });
  tuningData = JSON.parse(JSON.stringify(rec.tuningData || { pitchBefore:'440', pitchAfter:'440', preCondition:'', postComment:'', stringPinMemo:'' }));
  touchData  = JSON.parse(JSON.stringify(rec.touchData  || { inspectionDW:'', inspectionUW:'', finalDW:'', finalUW:'' }));
  evaluation = migrateEvaluation(rec.evaluation);
  buildScenes();
  restoreChecklistUI();
  restoreTuningUI();
  document.getElementById('btn-save').textContent = t('btnUpdate');
  showView('new');
  restoreEvalForm();   // called AFTER showView so the inputs are visible when values are set
  window.scrollTo(0, 0);
}

function exportJSON() {
  if (!records.length) { toast(t('toastImportFail')); return; }
  const data = { app: 'resolog', version: 3, exportedAt: new Date().toISOString(), records };
  dlBlob(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }),
    'resolog-backup-' + todayStr() + '.json');
  toast(t('toastJsonExported'));
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data   = JSON.parse(e.target.result);
      const incoming = Array.isArray(data.records) ? data.records
                     : Array.isArray(data)          ? data
                     : null;
      if (!incoming || !incoming.length) { toast(t('toastImportFail')); return; }
      if (!confirm(t('importConfirm', incoming.length))) return;
      // Merge by ID — incoming overwrites existing on collision
      const map = new Map(records.map(r => [r.id, r]));
      incoming.forEach(r => { if (r && r.id) map.set(r.id, r); });
      records = [...map.values()].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      save(); updateNavCount(); renderList(); buildAllDataLists();
      toast(t('toastImported', incoming.length));
    } catch { toast(t('toastImportFail')); }
  };
  reader.readAsText(file);
}

function exportMD(rec) {
  const td = rec.tuningData || {};
  const cl = rec.checklist  || {};
  const ev = rec.evaluation;
  const san = s => (s || '').trim().replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '_');

  // --- Pass 1: pre-compute completion stats & climate ---
  let totalDone = 0, totalAll = 0;
  let firstTemp = null, firstHumidity = null;
  getScenesFor(rec.type).forEach(scene => {
    if (scene.type === 'form') return;
    const ss = cl[scene.id] || {};
    if (Array.isArray(ss)) return;
    scene.groups.forEach(g => {
      if (g.isDkSection && !rec.disklavier) return;
      g.items.forEach(item => {
        totalAll++;
        const st = ss[item.id] || {};
        if (st.checked) totalDone++;
        if (item.hasClimate && firstTemp === null && (st.temp || st.humidity)) {
          firstTemp     = st.temp     ? +st.temp     : null;
          firstHumidity = st.humidity ? +st.humidity : null;
        }
      });
    });
  });
  const completionPct = totalAll > 0 ? Math.round(totalDone / totalAll * 100) : null;

  // --- YAML frontmatter ---
  // obsLink uses sanitizeFileName so wikilink targets match the actual filenames
  const obsLink = v => obsidianMode ? '"[[' + sanitizeFileName(v) + ']]"' : v;
  const assetStr = [rec.maker, rec.model, rec.serial].filter(Boolean).join(' ');

  let md = '---\n';
  md += 'date: ' + rec.date + '\n';
  if (rec.customer) { md += 'client: ' + obsLink(rec.customer) + '\nclient_type: ' + (rec.clientType || 'artist') + '\n'; }
  if (rec.location) md += 'venue: ' + obsLink(rec.location) + '\n';
  if (assetStr)     md += 'asset: ' + obsLink(assetStr) + '\n';
  md += 'asset_type: piano\n';
  const pt = PIANO_TYPE_KEYS[rec.type] || rec.type || '';
  if (pt)         md += 'piano_type: ' + pt + '\n';
  if (rec.maker)  md += 'piano_make: ' + rec.maker + '\n';
  if (rec.model)  md += 'piano_model: ' + rec.model + '\n';
  if (rec.serial) md += 'serial_number: ' + rec.serial + '\n';
  if (rec.staff)  md += 'staff: ' + rec.staff + '\n';
  if (rec.workType) md += 'work_type: ' + (WORK_TYPE_KEYS[rec.workType] || rec.workType) + '\n';
  if (ev?.overall && ev.overall !== 'none')
    md += 'overall_rating: ' + (ev.overall === 'needs-improvement' ? 'needs_improvement' : ev.overall) + '\n';
  if (firstTemp     !== null) md += 'temperature_c: '    + firstTemp     + '\n';
  if (firstHumidity !== null) md += 'humidity_percent: ' + firstHumidity + '\n';
  if (completionPct !== null) {
    md += 'completion_count: '   + totalDone      + '\n';
    md += 'completion_total: '   + totalAll       + '\n';
    md += 'completion_percent: ' + completionPct  + '\n';
  }
  const finalTags = activeTags.size
    ? [...activeTags].sort()
    : computeAutoTags(rec); // fallback if exported without opening detail view
  if (finalTags.length) md += 'tags:\n' + finalTags.map(t => '  - ' + t).join('\n') + '\n';
  md += '---\n\n';

  // --- 作業内容 ---
  md += t('mdWork') + '\n';

  // --- Summary Builder items (or fallback auto-generation) ---
  if (summaryItems.length) {
    summaryItems.filter(it => it.included).forEach(it => { md += '- ' + it.text + '\n'; });
  } else {
    // ピッチ
    if (td.pitchAfter || td.pitchBefore) {
      const after = td.pitchAfter || '—', before = td.pitchBefore || '—';
      md += before !== after
        ? '- Tuning at ' + after + 'Hz（前: ' + before + 'Hz）\n'
        : '- Tuning at ' + after + 'Hz\n';
    }
    if (td.preCondition)  md += '- 調律前: '  + td.preCondition  + '\n';
    if (td.postComment)   md += '- 調律後: '  + td.postComment   + '\n';
    if (td.stringPinMemo) md += '- 弦・ピン: ' + td.stringPinMemo + '\n';
    // Checklist items
    getScenesFor(rec.type).forEach(scene => {
      if (scene.type === 'form') return;
      const ss = cl[scene.id] || {};
      if (Array.isArray(ss)) return;
      scene.groups.forEach(g => {
        if (g.isDkSection && !rec.disklavier) return;
        g.items.forEach(item => {
          const st = ss[item.id] || {};
          if (!st.checked) return;
          if (item.hasMm && st.mm) {
            const zoneLabels = { bass: t('zoneBass'), mid: t('zoneMid'), treble: t('zoneTreble') };
            const parts = ['bass','mid','treble'].map(z => {
              const b = st.mm[z]?.before, a = st.mm[z]?.after;
              return (b || a) ? zoneLabels[z] + ' ' + (b||'—') + '→' + (a||'—') + 'mm' : null;
            }).filter(Boolean);
            md += '- ' + iLabel(item) + (parts.length ? '（' + parts.join(' / ') + '）' : '') + '\n';
            if (st.memo) md += '  - ' + st.memo + '\n';
          } else {
            md += '- ' + iLabel(item) + '\n';
            if (item.hasMemo && st.memo) md += '  - ' + st.memo + '\n';
            if (item.hasClimate && (st.temp || st.humidity))
              md += '  - ' + [st.temp && st.temp + '℃', st.humidity && st.humidity + '%'].filter(Boolean).join(' / ') + '\n';
          }
        });
      });
    });
  }
  if (completionPct !== null) md += '\n' + t('mdCompletion', totalDone, totalAll) + '\n';

  // 評価スライダー
  if (ev) {
    md += '\n';
    getEvalSliders().forEach(({ key, label }) => {
      const b = ev[key]?.before ?? 3, a = ev[key]?.after ?? 3;
      const memo = ev[key]?.memo || '';
      md += '- ' + label + ': ' + b + ' → ' + a + (memo ? '（' + memo + '）' : '') + '\n';
    });
    const ov = ev.overall ? '　' + overallLabel(ev.overall) : '';
    if (ev.positive || ev.negative)
      md += '\n> ' + [ev.positive, ev.negative].filter(Boolean).join('　') + (ov || '') + '\n';
  }

  // --- 個人メモ・気づき ---
  if (rec.memo) md += '\n' + t('mdMemo') + '\n' + rec.memo + '\n';

  // --- 技術的発見 (各行を Obsidian 内部リンクとして出力) ---
  if (rec.techNote) {
    const techLines = rec.techNote.split('\n').map(l => l.trim()).filter(Boolean);
    if (techLines.length) {
      md += '\n' + t('mdTech') + '\n' +
        techLines.map(l => '- [[' + sanitizeFileName(l) + ']]').join('\n') + '\n';
    }
  }

  md += '\n---\n*' + (rec.savedAt || '') + '*\n';

  const fname = [rec.date, san(rec.location), san(rec.maker), san(rec.serial)].filter(Boolean).join('_') + '.md';
  dlBlob(new Blob([md], { type: 'text/markdown;charset=utf-8;' }), fname);
  toast(t('toastMd'));
  const stored = records.find(r => r.id === rec.id);
  if (stored) { stored.markdown_exported = true; stored.edited_after_export = false; save(); }
}

function dlBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* =====================================================
   UTILITIES
===================================================== */
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function esc(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}
/**
 * Sanitize a display string for use as an Obsidian file name or internal link.
 * Characters that are illegal / special on file systems or in Obsidian wikilinks
 * are replaced or removed.  The original display string is left untouched.
 */
function sanitizeFileName(s) {
  return String(s)
    .replace(/[/\\]/g, '-')   // path separators → hyphen
    .replace(/:/g,     '-')   // colon → hyphen
    .replace(/[*?"<>]/g, '')  // wildcards / quotes → remove
    .replace(/\|/g,    '-')   // pipe → hyphen
    .replace(/\s+/g,   ' ')   // collapse whitespace
    .trim();
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => el.classList.remove('show'), 2600);
}

/* =====================================================
   AUTOCOMPLETE / ASSET SUGGEST
===================================================== */
function getHistory(field, limit) {
  const seen = new Set(), result = [];
  for (const r of records) {
    const v = r[field];
    if (v && !seen.has(v)) { seen.add(v); result.push(v); }
    if (result.length >= (limit || 20)) break;
  }
  return result;
}

function fillDatalist(id, values) {
  const dl = document.getElementById(id);
  if (!dl) return;
  dl.innerHTML = '';
  values.forEach(v => { const o = document.createElement('option'); o.value = v; dl.appendChild(o); });
}

function buildAllDataLists() {
  fillDatalist('dl-serial',   getHistory('serial'));
  fillDatalist('dl-model',    getHistory('model'));
  fillDatalist('dl-maker',    getHistory('maker'));
  fillDatalist('dl-location', getHistory('location'));
  fillDatalist('dl-customer', getHistory('customer'));
  fillDatalist('dl-staff',    getHistory('staff'));
}

function showAssetSuggest(serial) {
  const panel = document.getElementById('asset-suggest-panel');
  if (!panel) return;
  if (!serial) { panel.style.display = 'none'; return; }

  // 直近の過去記録を検索（編集中の記録自身は除外、新しい順なので find で最新が取れる）
  const rec = records.find(r => r.serial === serial && r.id !== editingId);
  if (!rec) { panel.style.display = 'none'; return; }

  // --- 楽器情報（Apply 対象）---
  const rows = [
    [t('lblMaker'),    rec.maker],
    [t('lblModel'),    rec.model],
    [t('lblType'),     rec.type ? pianoLabel(rec.type) : ''],
    [t('lblLocation'), rec.location],
    [t('lblCustomer'), rec.customer],
    [t('lblStaff'),    rec.staff],
  ].filter(([, v]) => v);

  // --- 前回作業情報（表示＋Apply 対象）---
  const days = rec.date ? Math.round((Date.now() - new Date(rec.date)) / 86400000) : null;
  const prevDateText  = rec.date ? fmtDate(rec.date) + ' (' + t('daysAgo', days) + ')' : '';
  const prevPitch     = rec.tuningData?.pitchAfter ? rec.tuningData.pitchAfter + ' Hz' : '';
  const prevWorkType  = rec.workType ? workTypeLabel(rec.workType) : '';

  const sessionRows = [
    [t('acPrevDate'),  prevDateText],
    [t('acPrevPitch'), prevPitch],
    [t('lblWorkType'), prevWorkType],
  ].filter(([, v]) => v);

  // --- 前回 after-evaluation データ ---
  const EVAL_KEYS = ['touch','repetition','volume','tone_color','intonation','dynamics_curve','evenness'];
  const prevEval = rec.evaluation || {};
  const prevAfterVals = {};
  EVAL_KEYS.forEach(k => {
    const v = prevEval[k]?.after;
    if (v !== undefined && v !== null) prevAfterVals[k] = v;
  });
  const hasEvalData = Object.keys(prevAfterVals).length > 0;

  const rowsHtml = r => r.map(([l, v]) =>
    `<div class="as-row"><span class="as-lbl">${esc(l)}:</span><span class="as-val">${esc(String(v))}</span></div>`).join('');

  // eval プレビュー HTML
  let evalHtml = '';
  if (hasEvalData) {
    const items = EVAL_KEYS
      .filter(k => prevAfterVals[k] !== undefined)
      .map(k => `<div class="as-eval-item"><span class="as-lbl">${esc(t('sl' + slKey(k)))}:</span><span class="as-eval-score">${prevAfterVals[k]}</span></div>`)
      .join('');
    evalHtml = `<div class="as-divider">${t('acPrevEval')}</div>` +
               `<div class="as-eval-preview">${items}</div>`;
  }

  const assetName = [rec.model, rec.serial ? '#' + rec.serial : ''].filter(Boolean).join(' ');
  panel.innerHTML =
    `<div class="as-title">${t('acFound')}</div>` +
    `<div class="as-name">${esc(assetName)}</div>` +
    (rows.length        ? `<div class="as-rows">${rowsHtml(rows)}</div>` : '') +
    (sessionRows.length ? `<div class="as-divider">${t('acPrevSession')}</div><div class="as-rows">${rowsHtml(sessionRows)}</div>` : '') +
    evalHtml +
    `<button class="as-btn" id="btn-apply-suggest">${t('acApply')}</button>`;
  panel.style.display = 'block';

  document.getElementById('btn-apply-suggest').addEventListener('click', () => {
    const fill = (id, val) => { if (val && !document.getElementById(id)?.value) document.getElementById(id).value = val; };

    // 楽器情報
    fill('f-maker',    rec.maker);
    fill('f-model',    rec.model);
    fill('f-location', rec.location);
    fill('f-customer', rec.customer);
    fill('f-staff',    rec.staff);

    // ピアノ種別
    if (rec.type && !document.querySelector('input[name="piano-type"]:checked')) {
      const rb = document.getElementById('pt-' + rec.type);
      if (rb) { rb.checked = true; rb.dispatchEvent(new Event('change')); }
    }

    // Last Tuned：前回作業日を反映（空欄の場合のみ）
    fill('f-last-tuned', rec.date);

    // 前回 after-evaluation → 今回 before-evaluation（デフォルト値 3 のスライダーのみ上書き）
    EVAL_KEYS.forEach(k => {
      const prevVal = prevAfterVals[k];
      if (prevVal === undefined) return;
      const slEl = document.getElementById('sl-' + k + '-before');
      const svEl = document.getElementById('sv-' + k + '-before');
      if (!slEl) return;
      if (parseInt(slEl.value, 10) === 3) {  // デフォルト値のみ上書き
        slEl.value = prevVal;
        if (svEl) svEl.textContent = prevVal;
        if (!evaluation[k]) evaluation[k] = { before: 3, after: 3, memo: '' };
        evaluation[k].before = prevVal;
      }
    });

    panel.style.display = 'none';
    markDirty();
  });
}

function onModelChange(model) {
  if (!model) return;
  const rec = records.find(r => r.model === model);
  if (!rec) return;
  if (rec.maker && !document.getElementById('f-maker').value)
    document.getElementById('f-maker').value = rec.maker;
  if (rec.type && !document.querySelector('input[name="piano-type"]:checked')) {
    const rb = document.getElementById('pt-' + rec.type);
    if (rb) { rb.checked = true; rb.dispatchEvent(new Event('change')); }
  }
}

/* =====================================================
   EVENT LISTENERS
===================================================== */
document.querySelectorAll('.nav-tab').forEach(btn => btn.addEventListener('click', () => {
  // 「新規記録」タブ → 編集モードを終了してフォームをクリア
  if (btn.dataset.view === 'new') clearForm();
  showView(btn.dataset.view);
}));

document.querySelectorAll('input[name="piano-type"]').forEach(rb => {
  rb.addEventListener('change', () => {
    if (currentPianoType === rb.value) return;
    currentPianoType = rb.value;
    initChecklist(); buildScenes();
  });
});

document.getElementById('f-work-type').addEventListener('change', e => {
  currentWorkType = e.target.value; updateHighlights();
});

document.getElementById('f-disklavier').addEventListener('change', e => {
  isDK = e.target.checked; updateDkVisibility();
});
document.getElementById('f-serial').addEventListener('change', e => showAssetSuggest(e.target.value.trim()));
document.getElementById('f-model').addEventListener('change',  e => onModelChange(e.target.value.trim()));

   LANGUAGE TOGGLE
===================================================== */
document.getElementById('lang-btn').addEventListener('click', () => {
  lang = lang === 'ja' ? 'en' : 'ja';
  localStorage.setItem('lang', lang);
  applyI18n();
  // re-render dynamic views if currently shown
  const listView = document.getElementById('view-list');
  if (listView.classList.contains('active')) renderList();
  const detailView = document.getElementById('view-detail');
  if (detailView.classList.contains('active') && currentDetailRec) showDetail(currentDetailRec.id);
});

===================================================== */
load();
initChecklist();
initEvaluation();
initEvalListeners();
document.getElementById('f-date').value = todayStr();
document.getElementById('f-staff').value = 'Shinya Maeda';
updateNavCount();
applyI18n();
buildAllDataLists();
</script>
